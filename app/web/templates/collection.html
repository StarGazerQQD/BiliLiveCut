<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>合集编辑器 — BiliLiveCut</title>
  <link rel="stylesheet" href="/static/style.css?v=2" />
</head>
<body class="standalone-shell collection-shell">
<div class="page-wrap">
<header class="page-head">
  <div>
    <div class="page-kicker">Collection builder</div>
    <h1>合集编辑器</h1>
    <p class="hint"><span id="topic-title">加载中…</span> · <span id="topic-summary"></span></p>
  </div>
  <a class="back-link" href="/">返回控制台</a>
</header>

<div class="card" id="summary-card">
  <div class="collection-summary">
    <div class="summary-metric"><span>事件数</span><b id="sum-count">-</b></div>
    <div class="summary-metric"><span>总时长</span><b id="sum-dur">-</b></div>
    <div class="summary-metric"><span>置信度</span><b id="sum-conf">-</b></div>
    <div class="summary-metric"><span>片段检查</span><b class="overlap-warn" id="overlap-warn">-</b></div>
  </div>
</div>

<div class="card">
  <h3>排序(拖动调整)</h3>
  <ul class="event-list" id="event-list"></ul>
</div>

<div class="card">
  <h3>合集设置</h3>
  <label><input type="checkbox" id="ch-cards" checked /> 插入章节标题卡(2秒)</label>
  <div class="row collection-actions">
    <button class="primary" id="btn-render" onclick="doRender()">渲染合集</button>
    <button id="btn-cancel-render" onclick="cancelCollectionRender()" style="display:none">停止渲染</button>
    <button onclick="saveOrder()">保存顺序</button>
    <button onclick="generateCopywriter()">生成文案</button>
  </div>
  <p class="hint" id="render-status"></p>
</div>

<div class="card" id="copywriter-card" style="display:none">
  <h3>生成文案</h3>
  <div id="copywriter-output" class="copywriter-output"></div>
</div>

</div>

<div id="toast" class="toast"></div>

<script>
const TOPIC_ID = {{ topic_id | int }};
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
let collectionData = null;
let eventOrder = [];

function toast(m){const e=$("#toast");e.textContent=m;e.classList.add("show");setTimeout(()=>e.classList.remove("show"),2500)}
function pad(n){return String(n).padStart(2,"0")}
function fmtDur(s){const m=Math.floor(s/60);const sec=Math.floor(s%60);return `${pad(m)}:${pad(sec)}`}

async function api(m,u,b){const o={method:m,headers:{}};if(b){o.headers["Content-Type"]="application/json";o.body=JSON.stringify(b)}const r=await fetch(u,o);if(!r.ok){const t=await r.text();throw new Error(t.substring(0,100))}const ct=r.headers.get("content-type")||"";return ct.includes("json")?r.json():r.text()}

async function loadData(){
  try{
    collectionData = await api("GET",`/collection/api/${TOPIC_ID}`);
    eventOrder = collectionData.events.map(e=>e.event_id);
    render();
  }catch(e){toast("加载失败:"+e.message)}
}

function render(){
  const d=collectionData;
  $("#topic-title").textContent=d.topic.title||"未命名主题";
  $("#topic-summary").textContent=d.topic.summary||"";
  $("#sum-count").textContent=d.events.length;
  const total=d.events.reduce((s,e)=>s+(e.duration_s||0),0);
  $("#sum-dur").textContent=fmtDur(total)+" ("+total.toFixed(0)+"s)";
  $("#sum-conf").textContent=(d.topic.confidence*100).toFixed(0)+"%";

  // 重叠警告。
  const hasOverlap=d.overlaps.some(o=>o.mergeable&&o.overlap_s>0);
  $("#overlap-warn").textContent=hasOverlap?"⚠ 存在重叠片段":"✓ 无重叠";

  // 事件列表。
  const list=$("#event-list");
  list.innerHTML=d.events.map((e,i)=>`
    <li class="event-item" draggable="true" data-idx="${i}" data-eid="${e.event_id}">
      <span class="drag">⠿</span>
      <span class="num">${i+1}</span>
      <div class="info">
        <div class="title">#${e.candidate_id} · ${(e.score||0).toFixed(2)}分 ${esc(e.reason||"")}</div>
        <div class="sub">${e.clip?esc(e.clip.title)||"":"(无成品)"}</div>
      </div>
      <input class="ch-title" placeholder="章节标题" value="" data-idx="${i}" />
      <span class="dur">${e.duration_s?s=>(Math.floor(s/60)+":"+String(Math.floor(s%60)).padStart(2,"0"))(e.duration_s):"--"}</span>
    </li>`).join("");

  // 拖拽排序。
  let dragIdx=-1;
  list.querySelectorAll(".event-item").forEach(el=>{
    el.addEventListener("dragstart",e=>{dragIdx=+el.dataset.idx;el.style.opacity="0.4"});
    el.addEventListener("dragend",e=>{el.style.opacity="1";list.querySelectorAll(".event-item").forEach(l=>l.classList.remove("dragover"))});
    el.addEventListener("dragover",e=>{e.preventDefault();el.classList.add("dragover")});
    el.addEventListener("dragleave",e=>{el.classList.remove("dragover")});
    el.addEventListener("drop",e=>{
      e.preventDefault();el.classList.remove("dragover");
      const from=dragIdx,to=+el.dataset.idx;
      if(from===to)return;
      const evs=collectionData.events;
      const[moved]=evs.splice(from,1);evs.splice(to,0,moved);
      eventOrder=evs.map(e=>e.event_id);
      render();
    });
  });
}

async function saveOrder(){
  try{
    await api("POST",`/collection/api/${TOPIC_ID}/reorder`,{event_ids:eventOrder});
    toast("顺序已保存");
  }catch(e){toast("保存失败:"+e.message)}
}

async function doRender(){
  const titles=[];
  $$(".ch-title").forEach(el=>titles.push(el.value||""));
  const cards=$("#ch-cards").checked;
  toast("正在提交后台渲染作业…");
  try{
    const res=await api("POST",`/collection/api/${TOPIC_ID}/render`,{
      event_ids:eventOrder,
      chapter_titles:titles,
      include_chapter_cards:cards,
    });
    collectionJobId=res.job.id;
    $("#btn-cancel-render").style.display="";
    toast("合集已在后台渲染");
    await watchCollectionJob(collectionJobId);
  }catch(e){toast("渲染失败:"+e.message)}
}

let collectionJobId=null;
async function watchCollectionJob(jobId){
  for(;;){
    const job=await api("GET",`/api/jobs/${jobId}`);
    $("#render-status").textContent=`${job.progress||0}% · ${job.message||job.status}`;
    if(["succeeded","failed","cancelled"].includes(job.status)){
      $("#btn-cancel-render").style.display="none";
      collectionJobId=null;
      if(job.status==="succeeded") toast("合集渲染完成:"+(job.result?.file_path||""));
      else toast(job.status==="cancelled"?"合集渲染已取消":"合集渲染失败:"+(job.error||"未知错误"));
      return;
    }
    await new Promise(resolve=>setTimeout(resolve,1500));
  }
}

async function cancelCollectionRender(){
  if(!collectionJobId)return;
  try{await api("POST",`/api/jobs/${collectionJobId}/cancel`);$("#render-status").textContent="正在停止…"}
  catch(e){toast("停止失败:"+e.message)}
}

async function generateCopywriter(){
  toast("文案生成中…");
  try{
    const res=await api("POST",`/collection/api/${TOPIC_ID}/copywriter`);
    const el=$("#copywriter-output");
    el.innerHTML=`
      <p><b>主题摘要:</b> ${esc(res.summary||"")}</p>
      <p><b>标题:</b> <span style="color:var(--accent)">${esc(res.title||"")}</span></p>
      <p><b>封面短标题:</b> <span style="color:var(--yellow)">${esc(res.cover_title||"")}</span></p>
      <p><b>简介:</b></p>
      <pre style="font-size:11px;white-space:pre-wrap;background:var(--bg);padding:8px;border-radius:4px;max-height:200px;overflow-y:auto">${esc(res.description||"")}</pre>
      <p><b>标签:</b> ${esc(res.tags||"")}</p>
      <p><b>章节:</b></p>
      <ul>${(res.chapters||[]).map(c=>`<li><code>${esc(c.ts)}</code> ${esc(c.title)}</li>`).join("")}</ul>
    `;
    $("#copywriter-card").style.display="";
    toast("文案生成完成");
  }catch(e){toast("文案生成失败:"+e.message)}
}

function esc(s){if(!s)return"";return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

loadData();
</script>
</body>
</html>
