<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>合集编辑器 — BiliLiveCut</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    :root{--bg:#0d0d1a;--surface:#16162a;--border:#2a2a4a;--accent:#5b9cf5;--green:#34d399;--yellow:#fbbf24;--red:#f87171;--text:#e2e2f0;--muted:#8888aa}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,"Segoe UI",sans-serif;padding:20px;max-width:900px;margin:0 auto}
    h2{margin-bottom:12px;color:var(--accent)}
    .hint{font-size:12px;color:var(--muted);margin:8px 0}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:14px;margin-bottom:12px}
    .summary{display:flex;gap:16px;font-size:13px;margin-bottom:12px}
    .summary b{color:var(--accent)}
    .event-list{list-style:none}
    .event-item{display:flex;align-items:center;gap:10px;padding:8px;margin:4px 0;background:var(--bg);border:1px solid var(--border);border-radius:4px;cursor:grab;transition:background .15s}
    .event-item:hover{background:var(--surface)}
    .event-item.dragover{border-color:var(--accent);background:rgba(91,156,245,0.1)}
    .event-item .drag{color:var(--muted);font-size:14px;cursor:grab;min-width:20px}
    .event-item .num{min-width:24px;font-weight:700;color:var(--accent)}
    .event-item .info{flex:1;min-width:0}
    .event-item .title{font-size:13px;font-weight:600}
    .event-item .sub{font-size:11px;color:var(--muted)}
    .event-item .dur{font-size:12px;color:var(--green);font-family:monospace;min-width:50px;text-align:right}
    .event-item .ch-title{width:120px;padding:3px 6px;font-size:11px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:3px}
    .overlap-warn{font-size:11px;color:var(--yellow);margin-left:8px}
    .row{display:flex;gap:10px;align-items:center;margin-top:12px}
    button{padding:8px 16px;font-size:13px;border-radius:4px;border:1px solid var(--border);cursor:pointer;background:var(--surface);color:var(--text)}
    button:hover{opacity:.85}
    .btn-primary{background:var(--accent);color:#fff;font-weight:600}
    .btn-danger{background:var(--red);color:#fff}
    input[type=checkbox]{margin-right:4px}
    label{font-size:12px;color:var(--muted)}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);color:var(--text);padding:10px 24px;border-radius:6px;border:1px solid var(--accent);font-size:13px;z-index:999;display:none}
    .toast.show{display:block}
  </style>
</head>
<body>
<h2>📦 合集编辑器 — <span id="topic-title">加载中…</span></h2>
<p class="hint" id="topic-summary"></p>

<div class="card" id="summary-card">
  <div class="summary">
    <span>事件数 <b id="sum-count">-</b></span>
    <span>总时长 <b id="sum-dur">-</b></span>
    <span>置信度 <b id="sum-conf">-</b></span>
    <span class="overlap-warn" id="overlap-warn"></span>
  </div>
</div>

<div class="card">
  <h3>排序(拖动调整)</h3>
  <ul class="event-list" id="event-list"></ul>
</div>

<div class="card">
  <h3>合集设置</h3>
  <label><input type="checkbox" id="ch-cards" checked /> 插入章节标题卡(2秒)</label>
  <div class="row">
    <button class="btn-primary" id="btn-render" onclick="doRender()">🎬 渲染合集</button>
    <button onclick="saveOrder()">💾 保存顺序</button>
    <button onclick="generateCopywriter()">📝 生成文案</button>
  </div>
  <p class="hint" id="render-status"></p>
</div>

<div class="card" id="copywriter-card" style="display:none">
  <h3>生成文案</h3>
  <div id="copywriter-output"></div>
</div>

<div id="toast" class="toast"></div>

<script>
const TOPIC_ID = {{ topic_id }};
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
let collectionData = null;
let eventOrder = [];

function toast(m){const e=$("#toast");e.textContent=m;e.classList.add("show");setTimeout(()=>e.classList.remove("show"),2500)}
function pad(n){return String(n).padStart(2,"0")}
function fmtDur(s){const m=Math.floor(s/60);const sec=Math.floor(s%60);return `${pad(m)}:${pad(sec)}`}

async function api(m,u,b){const o={method:m,headers:{}};if(b){o.headers["Content-Type"]="application/json";o.body=JSON.stringify(b)}const r=await fetch(u,o);if(!r.ok){const t=await r.text();throw new Error(t.substring(0,100))}const ct=r.headers.get("content-type")||"";return ct.includes("json")?r.json():r.text()}

async function loadData(){
  try{
    collectionData = await api("GET",`/collection/api/${TOPIC_ID}`);
    eventOrder = collectionData.events.map(e=>e.event_id);
    render();
  }catch(e){toast("加载失败:"+e.message)}
}

function render(){
  const d=collectionData;
  $("#topic-title").textContent=d.topic.title||"未命名主题";
  $("#topic-summary").textContent=d.topic.summary||"";
  $("#sum-count").textContent=d.events.length;
  const total=d.events.reduce((s,e)=>s+(e.duration_s||0),0);
  $("#sum-dur").textContent=fmtDur(total)+" ("+total.toFixed(0)+"s)";
  $("#sum-conf").textContent=(d.topic.confidence*100).toFixed(0)+"%";

  // 重叠警告。
  const hasOverlap=d.overlaps.some(o=>o.mergeable&&o.overlap_s>0);
  $("#overlap-warn").textContent=hasOverlap?"⚠ 存在重叠片段":"✓ 无重叠";

  // 事件列表。
  const list=$("#event-list");
  list.innerHTML=d.events.map((e,i)=>`
    <li class="event-item" draggable="true" data-idx="${i}" data-eid="${e.event_id}">
      <span class="drag">⠿</span>
      <span class="num">${i+1}</span>
      <div class="info">
        <div class="title">#${e.candidate_id} · ${(e.score||0).toFixed(2)}分 ${e.reason||""}</div>
        <div class="sub">${e.clip?e.clip.title||"":"(无成品)"}</div>
      </div>
      <input class="ch-title" placeholder="章节标题" value="" data-idx="${i}" />
      <span class="dur">${e.duration_s?s=>(Math.floor(s/60)+":"+String(Math.floor(s%60)).padStart(2,"0"))(e.duration_s):"--"}</span>
    </li>`).join("");

  // 拖拽排序。
  let dragIdx=-1;
  list.querySelectorAll(".event-item").forEach(el=>{
    el.addEventListener("dragstart",e=>{dragIdx=+el.dataset.idx;el.style.opacity="0.4"});
    el.addEventListener("dragend",e=>{el.style.opacity="1";list.querySelectorAll(".event-item").forEach(l=>l.classList.remove("dragover"))});
    el.addEventListener("dragover",e=>{e.preventDefault();el.classList.add("dragover")});
    el.addEventListener("dragleave",e=>{el.classList.remove("dragover")});
    el.addEventListener("drop",e=>{
      e.preventDefault();el.classList.remove("dragover");
      const from=dragIdx,to=+el.dataset.idx;
      if(from===to)return;
      const evs=collectionData.events;
      const[moved]=evs.splice(from,1);evs.splice(to,0,moved);
      eventOrder=evs.map(e=>e.event_id);
      render();
    });
  });
}

async function saveOrder(){
  try{
    await api("POST",`/collection/api/${TOPIC_ID}/reorder`,{event_ids:eventOrder});
    toast("顺序已保存");
  }catch(e){toast("保存失败:"+e.message)}
}

async function doRender(){
  const titles=[];
  $$(".ch-title").forEach(el=>titles.push(el.value||""));
  const cards=$("#ch-cards").checked;
  toast("渲染中,请稍候…");
  try{
    const res=await api("POST",`/collection/api/${TOPIC_ID}/render`,{
      event_ids:eventOrder,
      chapter_titles:titles,
      include_chapter_cards:cards,
    });
    toast("合集渲染完成! "+res.file_path);
    $("#render-status").textContent="渲染完成:"+res.file_path;
  }catch(e){toast("渲染失败:"+e.message)}
}

async function generateCopywriter(){
  toast("文案生成中…");
  try{
    const res=await api("POST",`/collection/api/${TOPIC_ID}/copywriter`);
    const el=$("#copywriter-output");
    el.innerHTML=`
      <p><b>主题摘要:</b> ${esc(res.summary||"")}</p>
      <p><b>B站标题:</b> <span style="color:var(--accent)">${esc(res.bilibili_title||"")}</span></p>
      <p><b>YouTube 标题:</b> <span style="color:var(--accent)">${esc(res.youtube_title||"")}</span></p>
      <p><b>封面短标题:</b> <span style="color:var(--yellow)">${esc(res.cover_title||"")}</span></p>
      <p><b>简介:</b></p>
      <pre style="font-size:11px;white-space:pre-wrap;background:var(--bg);padding:8px;border-radius:4px;max-height:200px;overflow-y:auto">${esc(res.description||"")}</pre>
      <p><b>标签:</b> ${esc(res.tags||"")}</p>
      <p><b>章节:</b></p>
      <ul>${(res.chapters||[]).map(c=>`<li><code>${esc(c.ts)}</code> ${esc(c.title)}</li>`).join("")}</ul>
    `;
    $("#copywriter-card").style.display="";
    toast("文案生成完成");
  }catch(e){toast("文案生成失败:"+e.message)}
}

function esc(s){if(!s)return"";return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

loadData();
</script>
</body>
</html>
