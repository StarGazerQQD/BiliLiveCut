<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>横屏审片工作台 — BiliLiveCut</title>
  <link rel="stylesheet" href="/static/style.css?v=2" />
</head>
<body class="review-shell">
<div class="topbar">
  <div class="brand"><span class="brand-mark" aria-hidden="true">B</span>审片工作台</div>
  <a href="/review/queue" class="shortcut-hint review-back">审核队列</a>
  <div class="review-meta">
    <span class="muted">候选 #<span id="cand-id">-</span></span>
    <span class="stat">总分 <b id="cand-score">-</b></span>
    <span class="stat">规则 <b id="rule-score">-</b></span>
    <span class="stat">LLM <b id="llm-score">-</b></span>
    <span class="stat">状态 <b id="cand-status">-</b></span>
    <span class="shortcut-hint">Space 播放 · I/O 入出点 · J/K/L 定位</span>
    <span class="muted" id="workflow-state">-</span>
  </div>
</div>

<div class="main">
  <!-- 左侧:播放器+弹幕图 -->
  <div class="player-col">
    <div class="player-area" id="player-area">
      <div class="player-placeholder" id="player-placeholder">
        <p>🎥 视频播放器</p>
        <p class="msg">请先在"成品切片"页面生成切片,或通过边界调整后点击「重新渲染」</p>
      </div>
      <video id="player" controls style="display:none" crossorigin="anonymous">
        <source id="player-src" src="" type="video/mp4" />
      </video>
    </div>
    <div class="waveform-chart" id="waveform-chart">
      <canvas id="wf-canvas"></canvas>
      <div class="legend">
        <span>🔊 音频波形</span>
        <span style="color:var(--accent)">▌ 播放头</span>
        <span style="color:var(--green)">▬ 入/出点区间</span>
      </div>
    </div>
    <div class="danmaku-chart" id="danmaku-chart">
      <canvas id="dm-canvas"></canvas>
      <div class="legend">
        <span>📊 弹幕密度 (5s桶)</span>
        <span style="color:var(--green)">▬ 入/出点区间</span>
      </div>
    </div>
    <div class="timeline-bar" id="timeline">
      <label>入点:</label>
      <input class="time-input" id="in-point" value="00:00:00" readonly />
      <div class="btn-group">
        <button onclick="adjust('start',-30)" title="左移 30s">-30s</button>
        <button onclick="adjust('start',-10)">-10s</button>
        <button onclick="adjust('start',-5)">-5s</button>
        <button onclick="adjust('start',-3)">-3s</button>
        <button onclick="adjust('start',+3)" class="active">+3s</button>
        <button onclick="adjust('start',+5)">+5s</button>
        <button onclick="adjust('start',+10)">+10s</button>
        <button onclick="adjust('start',+30)">+30s</button>
      </div>
      <span class="spacer"></span>
      <label>出点:</label>
      <input class="time-input" id="out-point" value="00:00:30" readonly />
      <div class="btn-group">
        <button onclick="adjust('end',-30)">-30s</button>
        <button onclick="adjust('end',-10)">-10s</button>
        <button onclick="adjust('end',-5)">-5s</button>
        <button onclick="adjust('end',-3)">-3s</button>
        <button onclick="adjust('end',+3)">+3s</button>
        <button onclick="adjust('end',+5)">+5s</button>
        <button onclick="adjust('end',+10)" class="active">+10s</button>
        <button onclick="adjust('end',+30)">+30s</button>
      </div>
      <button onclick="doRerender()" class="primary">重新渲染</button>
      <button id="btn-cancel-render" onclick="cancelRenderJob()" style="display:none">停止渲染</button>
      <span class="muted" id="render-job-status"></span>
    </div>
  </div>

  <!-- 右侧:评分+审核+导航 -->
  <div class="info-col" id="info-col">
    <div class="card">
      <h3>总评分</h3>
      <div class="score-bar"><div class="score-fill" id="score-fill" style="width:0%"></div></div>
      <div class="score-grid">
        <div class="score-item"><span>规则分</span><span class="val" id="rule-val">-</span></div>
        <div class="score-item"><span>LLM分</span><span class="val" id="llm-val">-</span></div>
        <div class="score-item"><span>综合分</span><span class="val" id="total-val">-</span></div>
        <div class="score-item"><span>状态</span><span class="val" id="status-val">-</span></div>
        <div class="score-item" style="grid-column:span 2"><span>LLM理由</span><span id="reason-val" style="font-size:11px">-</span></div>
      </div>
    </div>

    <div class="card" id="score-breakdown-card">
      <h3>评分维度贡献</h3>
      <div class="dim-bars" id="dim-bars"></div>
    </div>

    <div class="card" id="danmaku-explain-card" style="display:none">
      <h3>弹幕解释</h3>
      <div class="explain-text" id="danmaku-explain"></div>
    </div>

    <div class="card subtitle-card" id="subtitle-card">
      <h3>字幕时间轴</h3>
      <div id="subtitle-timeline"></div>
    </div>

    <div class="card">
      <h3>审核决断</h3>
      <div class="review-actions">
        <button id="btn-claim" onclick="claimCurrent(this.dataset.force === 'true')">领取</button>
        <button id="btn-release" onclick="releaseCurrent()">释放</button>
        <button id="btn-draft" onclick="saveDraft()">保存草稿</button>
        <button id="btn-undo" onclick="undoLast()">撤销上一步</button>
      </div>
      <div class="review-actions">
        <button class="btn-approve" onclick="submitReview('approved_solo')">✅ 独立成片</button>
        <button class="btn-approve" onclick="submitReview('approved_collection')">📦 合集候选</button>
        <button class="btn-hold" onclick="submitReview('hold')">⏸ 保留待定</button>
        <button onclick="submitReview('maybe_topic')">🔗 可能属某主题</button>
        <button onclick="submitReview('not_exciting')">💤 不够精彩</button>
        <button onclick="submitReview('insufficient_context')">📐 上下文不足</button>
        <button onclick="submitReview('start_too_late')">⏪ 开头截晚</button>
        <button onclick="submitReview('end_too_early')">⏩ 结尾截早</button>
        <button onclick="submitReview('duplicate_content')">🔄 内容重复</button>
        <button onclick="submitReview('subtitle_error')">📝 字幕错误</button>
        <button onclick="submitReview('visual_issue')">🖼 画面异常</button>
        <button onclick="submitReview('sensitive')">⚠ 敏感内容</button>
        <button class="btn-reject" onclick="submitReview('rejected')">❌ 拒绝</button>
      </div>
      <textarea class="review-reason" id="review-reason" placeholder="审核备注(选填)…"></textarea>
    </div>

    <div class="card">
      <h3>导航</h3>
      <div class="nav-row">
        <button id="btn-prev" onclick="navCandidate('prev')">◀ 上一个分段</button>
        <button id="btn-next" onclick="navCandidate('next')">下一个分段 ▶</button>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ===== 状态 =====
const CAND_ID = {{ candidate_id | int }};
let reviewData = null;
let adjustedStart = null;
let adjustedEnd = null;
let eventId = null;
let renderJobId = null;

// ===== 工具函数 =====
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

function fmtTime(iso) {
  if (!iso) return "--";
  const d = new Date(iso);
  return d.toLocaleTimeString("zh-CN", { hour12: false });
}

function fmtTimeShort(iso) {
  if (!iso) return "--";
  const m = iso.match(/T(\d{2}:\d{2}:\d{2})/);
  return m ? m[1] : iso.substring(0, 19);
}

function pad(n) { return String(n).padStart(2,"0"); }
function secToHHMMSS(total) {
  const s = Math.abs(Math.round(total));
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  const sec = s%60;
  return `${pad(h)}:${pad(m)}:${pad(sec)}`;
}

function durationSec(isoStart, isoEnd) {
  if (!isoStart || !isoEnd) return 0;
  return (new Date(isoEnd) - new Date(isoStart)) / 1000;
}

async function api(method, url, body) {
  const opts = { method, headers: {} };
  if (body) { opts.headers["Content-Type"] = "application/json"; opts.body = JSON.stringify(body); }
  const resp = await fetch(url, opts);
  if (!resp.ok) {
    const t = await resp.text();
    throw new Error(t.substring(0, 100));
  }
  const ct = resp.headers.get("content-type") || "";
  return ct.includes("json") ? resp.json() : resp.text();
}

function toast(msg) {
  const el = $("#toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2500);
}

// ===== 加载数据 =====
async function loadReviewData() {
  try {
    reviewData = await api("GET", `/review/api/${CAND_ID}`);
    renderReview();
  } catch (e) {
    toast("加载失败:" + e.message);
  }
}

function renderReview() {
  const d = reviewData;
  const c = d.candidate;

  $("#cand-id").textContent = c.id;
  const hidden = d.viewer?.blinded;
  $("#cand-score").textContent = hidden ? "盲审" : c.highlight_score.toFixed(3);
  $("#rule-score").textContent = hidden ? "-" : c.rule_score.toFixed(2);
  $("#llm-score").textContent = hidden ? "-" : c.llm_score.toFixed(2);
  $("#cand-status").textContent = c.status;

  $("#score-fill").style.width = hidden ? "0%" : Math.round(c.highlight_score * 100) + "%";
  $("#rule-val").textContent = hidden ? "已隐藏" : c.rule_score.toFixed(3);
  $("#llm-val").textContent = hidden ? "已隐藏" : c.llm_score.toFixed(3);
  $("#total-val").textContent = hidden ? "已隐藏" : c.highlight_score.toFixed(3);
  $("#status-val").textContent = c.status;
  $("#reason-val").textContent = c.reason || "(无)";

  const claim = d.workflow?.claim || {};
  const ownClaim = claim.active && claim.claimed_by === d.viewer?.actor;
  const adminCanEdit = d.viewer?.role === "admin" && (!claim.active || ownClaim);
  const canModify = adminCanEdit || ownClaim;
  $("#workflow-state").textContent = claim.active ? `由 ${claim.claimed_by} 审核` : "尚未领取";
  $("#btn-claim").dataset.force = String(d.viewer?.role === "admin" && claim.active && !ownClaim);
  $("#btn-claim").textContent = $("#btn-claim").dataset.force === "true" ? "强制接管" : "领取";
  $("#btn-claim").disabled = canModify;
  $("#btn-release").disabled = !claim.active || (!ownClaim && d.viewer?.role !== "admin");
  $("#btn-draft").disabled = !canModify;
  $("#btn-undo").disabled = !canModify || !d.workflow?.can_undo;
  $$(".timeline-bar button, .review-actions button").forEach(button => {
    if (!["btn-claim", "btn-release"].includes(button.id)) button.disabled = !canModify;
  });
  if (d.workflow?.draft && document.activeElement !== $("#review-reason")) {
    $("#review-reason").value = d.workflow.draft.reason || "";
  }

  // 入/出点。
  adjustedStart = d.boundary?.adjusted_start_ts || c.start_ts;
  adjustedEnd = d.boundary?.adjusted_end_ts || c.end_ts;
  eventId = d.boundary?.event_id || null;
  const origStart = new Date(c.start_ts).getTime() / 1000;
  $("#in-point").value = secToHHMMSS(new Date(adjustedStart).getTime() / 1000 - origStart);
  $("#out-point").value = secToHHMMSS(new Date(adjustedEnd).getTime() / 1000 - origStart);

  // 评分维度贡献。
  let barsHtml = "";
  const colors = {"volume":"#f87171","keywords":"#fbbf24","speech_rate":"#34d399","laughter":"#a78bfa","danmaku":"#5b9cf5","danmaku_sentiment":"#f472b6","trend":"#fb923c"};
  for (const dim of d.score_breakdown) {
    const pct = Math.round(dim.value * 100);
    barsHtml += `
      <div class="dim-row">
        <span class="dim-label">${esc(dim.label)}</span>
        <div class="dim-bar-wrap"><div class="dim-bar-fill" style="width:${pct}%;background:${colors[dim.dim]||"#888"}"></div></div>
        <span class="dim-val">${dim.value.toFixed(3)}</span>
      </div>`;
  }
  $("#dim-bars").innerHTML = barsHtml || "<span style='font-size:11px;color:var(--muted)'>暂无维度数据</span>";

  // 弹幕解释。
  if (d.danmaku_explain && d.danmaku_explain.window_count !== undefined) {
    $("#danmaku-explain-card").style.display = "";
    const de = d.danmaku_explain;
    $("#danmaku-explain").textContent =
      `当前窗口 ${de.window_rate?.toFixed(1) || 0} 条/秒, 房间基线 ${de.baseline_rate?.toFixed(1) || 0} 条/秒, 热度为平时的 ${(de.ratio || 0).toFixed(1)} 倍。(窗口弹幕 ${de.window_count || 0} 条)`;
  }

  // 弹幕密度图。
  drawDanmakuChart(d.danmaku_buckets, c.start_ts, c.end_ts, d.danmaku_window);

  // 音频波形。
  loadWaveform();

  // 字幕。
  renderSubtitles(d.transcript);

  // 视频播放器。
  if (d.existing_clips && d.existing_clips.length > 0) {
    const clip = d.existing_clips[0];
    $("#player-src").src = clip.video_url;
    $("#player").style.display = "";
    $("#player-placeholder").style.display = "none";
    $("#player").load();
  }

  // 导航按钮。
  if (d.prev_candidates && d.prev_candidates.length > 0) {
    $("#btn-prev").textContent = `◀ 上一个 (#${d.prev_candidates[d.prev_candidates.length-1].id} ${d.prev_candidates[d.prev_candidates.length-1].score?.toFixed(2)})`;
    $("#btn-prev").dataset.target = d.prev_candidates[d.prev_candidates.length-1].id;
  } else {
    $("#btn-prev").disabled = true;
  }
  if (d.next_candidates && d.next_candidates.length > 0) {
    $("#btn-next").textContent = `下一个 (#${d.next_candidates[0].id} ${d.next_candidates[0].score?.toFixed(2)}) ▶`;
    $("#btn-next").dataset.target = d.next_candidates[0].id;
  } else {
    $("#btn-next").disabled = true;
  }
}

// ===== 弹幕密度图 =====
function drawDanmakuChart(buckets, startTs, endTs, windowCtx) {
  const canvas = $("#dm-canvas");
  const ctx = canvas.getContext("2d");
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = 80;

  const W = canvas.width;
  const H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  if (!buckets || buckets.length === 0) {
    ctx.fillStyle = "#888";
    ctx.font = "11px sans-serif";
    ctx.fillText("暂无弹幕数据", 10, H/2);
    return;
  }

  const maxCount = Math.max(...buckets.map(b => b.count), 1);
  const margin = 30;
  const barW = Math.max(1, (W - margin * 2) / buckets.length);

  // 绘制柱状图。
  for (let i = 0; i < buckets.length; i++) {
    const h = (buckets[i].count / maxCount) * (H - 20);
    const x = margin + i * barW;
    const y = H - h - 10;

    // 判断该 bucket 是否在候选窗口内。
    const bucketTime = new Date(buckets[i].t * 1000).toISOString();
    const inWindow = bucketTime >= startTs && bucketTime <= endTs;

    ctx.fillStyle = inWindow ? "#34d399" : "#5b9cf5";
    ctx.globalAlpha = inWindow ? 1.0 : 0.4;
    ctx.fillRect(x, y, Math.max(1, barW - 1), h);
  }
  ctx.globalAlpha = 1;

  // 底部时间轴。
  if (buckets.length > 0) {
    ctx.fillStyle = "#888";
    ctx.font = "9px monospace";
    const t0 = new Date(buckets[0].t * 1000);
    const t1 = new Date(buckets[buckets.length - 1].t * 1000);
    ctx.fillText(t0.toLocaleTimeString("zh-CN", {hour:"2-digit",minute:"2-digit",second:"2-digit"}), margin, H - 2);
    const endLabel = t1.toLocaleTimeString("zh-CN", {hour:"2-digit",minute:"2-digit",second:"2-digit"});
    ctx.fillText(endLabel, W - margin - 60, H - 2);
  }

  // 最大值标注。
  ctx.fillStyle = "#fff";
  ctx.font = "10px monospace";
  ctx.fillText(maxCount + "", margin, 12);
}

// ===== 边界调整 =====
async function adjust(side, secs) {
  const currentIn = $("#in-point").value;
  const currentOut = $("#out-point").value;

  try {
    const res = await api("POST", `/review/api/${CAND_ID}/adjust`, { adjust_s: secs, side });
    if (res.adjusted_start_ts) adjustedStart = res.adjusted_start_ts;
    if (res.adjusted_end_ts) adjustedEnd = res.adjusted_end_ts;
    if (res.event_id) eventId = res.event_id;

    // 更新显示。
    const dur = durationSec(reviewData.candidate.start_ts, reviewData.candidate.end_ts);
    if (side === "start" || side === "both") {
      const origStart = new Date(reviewData.candidate.start_ts).getTime() / 1000;
      const adjStart = new Date(adjustedStart).getTime() / 1000;
      const offset = adjStart - origStart;
      $("#in-point").value = secToHHMMSS(offset);
    }
    if (side === "end" || side === "both") {
      const origStart = new Date(reviewData.candidate.start_ts).getTime() / 1000;
      const adjEnd = new Date(adjustedEnd).getTime() / 1000;
      const offset = adjEnd - origStart;
      $("#out-point").value = secToHHMMSS(offset);
    }
    toast(`边界已调整:${side} ${secs > 0 ? "+" : ""}${secs}s`);
  } catch (e) {
    toast("调整失败:" + e.message);
  }
}

async function doRerender() {
  toast("正在提交后台渲染作业…");
  try {
    const res = await api("POST", `/review/api/${CAND_ID}/rerender`);
    renderJobId = res.job.id;
    $("#btn-cancel-render").style.display = "";
    toast("渲染已在后台开始");
    await watchRenderJob(renderJobId);
  } catch (e) {
    toast("渲染失败:" + e.message);
  }
}

async function watchRenderJob(jobId) {
  for (;;) {
    const job = await api("GET", `/api/jobs/${jobId}`);
    $("#render-job-status").textContent = `${job.progress || 0}% · ${job.message || job.status}`;
    if (["succeeded", "failed", "cancelled"].includes(job.status)) {
      $("#btn-cancel-render").style.display = "none";
      renderJobId = null;
      if (job.status === "succeeded") {
        toast("审核版本渲染完成");
        await loadReviewData();
      } else {
        toast(job.status === "cancelled" ? "渲染已取消" : `渲染失败:${job.error || "未知错误"}`);
      }
      return;
    }
    await new Promise(resolve => setTimeout(resolve, 1500));
  }
}

async function cancelRenderJob() {
  if (!renderJobId) return;
  try {
    await api("POST", `/api/jobs/${renderJobId}/cancel`);
    $("#render-job-status").textContent = "正在停止…";
  } catch (e) { toast("停止失败:" + e.message); }
}

async function submitReview(decision) {
  const reason = $("#review-reason").value;
  try {
    await api("POST", `/review/api/${CAND_ID}/review`, { decision, reason });
    toast("审核已提交:" + decision);
    await loadReviewData();
  } catch (e) {
    toast("审核失败:" + e.message);
  }
}

async function claimCurrent(force = false) {
  try {
    await api("POST", `/review/api/${CAND_ID}/claim`, { force });
    toast("已领取当前候选");
    await loadReviewData();
  } catch (e) { toast("领取失败:" + e.message); }
}

async function releaseCurrent() {
  try {
    await api("POST", `/review/api/${CAND_ID}/release`);
    toast("已释放当前候选");
    await loadReviewData();
  } catch (e) { toast("释放失败:" + e.message); }
}

async function saveDraft(silent = false) {
  try {
    await api("PUT", `/review/api/${CAND_ID}/draft`, { reason: $("#review-reason").value });
    if (!silent) toast("草稿已保存");
  } catch (e) { if (!silent) toast("草稿保存失败:" + e.message); }
}

async function undoLast() {
  try {
    await api("POST", `/review/api/${CAND_ID}/undo`);
    toast("已撤销上一步");
    await loadReviewData();
  } catch (e) { toast("撤销失败:" + e.message); }
}

async function navCandidate(direction) {
  const btn = direction === "prev" ? $("#btn-prev") : $("#btn-next");
  const targetId = btn.dataset.target;
  if (!targetId) return;
  window.location.href = `/review/${targetId}`;
}

// ===== 音频波形 =====
let waveformPeaks = [];
let waveformDuration = 0;

async function loadWaveform() {
  try {
    const wf = await api("GET", `/review/api/${CAND_ID}/waveform`);
    waveformPeaks = wf.peaks || [];
    waveformDuration = wf.duration_s || 0;
    drawWaveform();
  } catch (e) { /* 波形生成失败不影响其他功能 */ }
}

function drawWaveform(playheadTime) {
  const canvas = $("#wf-canvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = 60;

  const W = canvas.width;
  const H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  if (!waveformPeaks.length) {
    ctx.fillStyle = "#888";
    ctx.font = "11px sans-serif";
    ctx.fillText("生成中或暂无切片…", 10, H/2);
    return;
  }

  const margin = 20;
  const barW = Math.max(1, (W - margin * 2) / waveformPeaks.length);
  const midY = H / 2;

  // 计算入/出点在波形上的位置。
  const dur = waveformDuration || 30;
  const inOffset = 0; // 波形始终从 0 开始
  const outOffset = dur;
  const inX = margin;
  const outX = W - margin;

  // 绘制波形柱。
  for (let i = 0; i < waveformPeaks.length; i++) {
    const x = margin + i * barW;
    const h = Math.max(1, (waveformPeaks[i] || 0) * (H - 8));
    const inWindow = x >= inX && x <= outX;
    ctx.fillStyle = inWindow ? "#34d399" : "#444";
    ctx.globalAlpha = inWindow ? 0.9 : 0.4;
    ctx.fillRect(x, midY - h / 2, Math.max(1, barW - 1), h);
  }
  ctx.globalAlpha = 1;

  // 播放头。
  if (playheadTime != null && dur > 0) {
    const px = margin + (playheadTime / dur) * (W - margin * 2);
    ctx.strokeStyle = "#5b9cf5";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(px, 4);
    ctx.lineTo(px, H - 4);
    ctx.stroke();
    // 播放头三角。
    ctx.fillStyle = "#5b9cf5";
    ctx.beginPath();
    ctx.moveTo(px, 0);
    ctx.lineTo(px - 4, 8);
    ctx.lineTo(px + 4, 8);
    ctx.fill();
  }
}

// ===== 字幕时间轴 =====
let subtitleWords = [];

function renderSubtitles(transcript) {
  const el = $("#subtitle-timeline");
  if (!transcript || !transcript.words || !transcript.words.length) {
    el.innerHTML = "<span style='font-size:11px;color:var(--muted)'>暂无字幕时间轴数据</span>";
    subtitleWords = [];
    return;
  }
  const words = transcript.words;
  subtitleWords = words;

  // 按3秒窗口分行。
  let html = "";
  let lineWords = [];
  let lineStart = words[0].start || 0;
  const WINDOW = 2.5; // 每行最大秒数

  for (const w of words) {
    const ws = w.start || 0;
    if (ws - lineStart > WINDOW && lineWords.length > 0) {
      html += buildSubLine(lineWords, lineStart);
      lineWords = [];
      lineStart = ws;
    }
    lineWords.push(w);
  }
  if (lineWords.length > 0) {
    html += buildSubLine(lineWords, lineStart);
  }
  el.innerHTML = html || "<span style='font-size:11px;color:var(--muted)'>暂无字幕</span>";

  // 点击字幕跳转。
  $$(".sub-word").forEach(el => {
    el.addEventListener("click", () => {
      const t = parseFloat(el.dataset.t);
      if (!isNaN(t)) {
        const player = $("#player");
        if (player) player.currentTime = t;
      }
    });
  });
}

function buildSubLine(words, lineStart) {
  let lineHtml = `<div class="sub-line" data-start="${lineStart}">
    <span class="sub-time">${secToHHMMSS(lineStart)}</span>`;
  for (const w of words) {
    lineHtml += `<span class="sub-word" data-t="${w.start || 0}">${esc(w.w || "")} </span>`;
  }
  lineHtml += "</div>";
  return lineHtml;
}

function esc(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function updateSubtitleHighlight(currentTime) {
  if (!subtitleWords.length) return;
  // 高亮当前词。
  $$(".sub-word").forEach(el => el.classList.remove("active"));
  $$(".sub-line").forEach(el => el.classList.remove("active"));

  let found = false;
  for (let i = 0; i < subtitleWords.length; i++) {
    const w = subtitleWords[i];
    const ws = w.start || 0;
    const we = w.end || ws + 0.5;
    if (currentTime >= ws && currentTime < we) {
      const wordEls = $$(".sub-word");
      if (wordEls[i]) {
        wordEls[i].classList.add("active");
        // 高亮所在行。
        const line = wordEls[i].closest(".sub-line");
        if (line) line.classList.add("active");
        // 自动滚动。
        line?.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
      found = true;
      break;
    }
  }
}

// 播放器时间同步。
$("#player").addEventListener ? null : null;
(function initPlayerSync() {
  let lastT = -1;
  setInterval(() => {
    const player = $("#player");
    if (!player || player.paused || player.readyState < 2) return;
    const t = player.currentTime;
    if (Math.abs(t - lastT) < 0.3) return; // 减少不必要的重绘
    lastT = t;
    drawWaveform(t);
    updateSubtitleHighlight(t);
  }, 200);
})();

// ===== 键盘快捷键 =====
document.addEventListener("keydown", (e) => {
  // 忽略在输入框中按键。
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT") return;

  const player = $("#player");
  switch (e.key) {
    case " ": case "Spacebar":
      e.preventDefault();
      if (player.paused) player.play(); else player.pause();
      break;
    case "i": case "I":
      e.preventDefault();
      // 在当前位置设入点。
      if (player.currentTime !== undefined) {
        const cur = player.currentTime;
        const origStart = new Date(reviewData.candidate.start_ts).getTime() / 1000;
        adjust("start", cur - (new Date(adjustedStart).getTime()/1000 - origStart));
      }
      break;
    case "o": case "O":
      e.preventDefault();
      if (player.currentTime !== undefined) {
        const cur = player.currentTime;
        const origStart = new Date(reviewData.candidate.start_ts).getTime() / 1000;
        adjust("end", cur - (new Date(adjustedEnd).getTime()/1000 - origStart));
      }
      break;
    case "ArrowLeft":
      e.preventDefault();
      player.currentTime = Math.max(0, player.currentTime - 5);
      break;
    case "ArrowRight":
      e.preventDefault();
      player.currentTime = Math.min(player.duration || Infinity, player.currentTime + 5);
      break;
    case "j": case "J":
      e.preventDefault();
      player.currentTime = Math.max(0, player.currentTime - 10);
      break;
    case "l": case "L":
      e.preventDefault();
      player.currentTime = Math.min(player.duration || Infinity, player.currentTime + 10);
      break;
    case "k": case "K":
      e.preventDefault();
      player.pause();
      break;
  }
});

loadReviewData();

window.addEventListener("resize", () => {
  if (reviewData) {
    drawDanmakuChart(reviewData.danmaku_buckets, reviewData.candidate.start_ts, reviewData.candidate.end_ts, reviewData.danmaku_window);
  }
});
