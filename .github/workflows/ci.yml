# BiliLiveCut CI
# 触发: push/PR 到 main → matrix 多平台多 Python 版本 → lint → test
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    name: "${{ matrix.os }} / py${{ matrix.python-version }} / lint & test"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # 安装 Ubuntu 系统依赖 (FFmpeg 用于音频相关测试)
      - name: Install system deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      # 安装 Windows 系统依赖 (FFmpeg via chocolatey)
      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg --no-progress -y

      # pip 镜像: 阿里云优先、清华备用, 不修改全局配置
      - name: Install Python dev dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]" \
            --index-url https://mirrors.aliyun.com/pypi/simple/ \
            --extra-index-url https://pypi.tuna.tsinghua.edu.cn/simple \
            --trusted-host mirrors.aliyun.com \
            --trusted-host pypi.tuna.tsinghua.edu.cn

      # python-multipart 为 web 测试所需, web extras 可能不含它
      - name: Install test extras
        shell: bash
        run: pip install python-multipart

      - name: Show installed packages
        shell: bash
        run: pip list

      # 不下载真实 ASR 模型; 所有 ASR 测试使用 Mock 后端
      - name: Ruff lint (no fix)
        shell: bash
        run: ruff check app/ tests/

      # 全量 pytest (Mock 后端, 无真实模型)
      - name: Run pytest
        shell: bash
        env:
          ASR_NO_MODEL_DOWNLOAD: "1"
          WHISPER_MODEL: ""
        run: python -m pytest tests/ -v --tb=short
        timeout-minutes: 15

      # 上传失败日志 (仅在失败时)
      - name: Upload pytest output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-failure-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            .pytest_cache/**/*.log
          retention-days: 7
          if-no-files-found: ignore
