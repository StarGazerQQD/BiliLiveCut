# BiliLiveCut CI (V0.1.15.2)
# 触发: push/PR 到 main → lint → audit + test → portable → coverage summary
#
# Job 结构:
#   lint       — ruff check + format + version + release_audit + JS syntax
#   audit      — pip-audit (不阻塞, 漏洞豁免为机器可读)
#   test       — Linux/Windows 多 Python → pytest + coverage (≥50%)
#   test-macos — main 推送时运行 macOS py3.12
#   portable   — Payload 构建 + Portable 全部测试
#   coverage   — 汇总多矩阵覆盖率报告

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
      - ".gitignore"
      - "KNOWN_ISSUES.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
      - ".gitignore"
      - "KNOWN_ISSUES.md"
  schedule:
    # 每周一 08:00 UTC 跑一次依赖审计
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ═══════════════════════════════════════════════════════════════════
# Job 1: Lint — 极速失败 (ruff + version + release_audit)
# ═══════════════════════════════════════════════════════════════════
jobs:
  lint:
    name: "lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # v4.2.2

      - uses: actions/setup-python@v5  # v5.4.0
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: python scripts/run_ruff.py check

      - name: Ruff format check
        run: python scripts/run_ruff.py format

      - name: Check version consistency
        run: python scripts/check_version_consistency.py

      - name: Release audit (quick)
        run: python scripts/release_audit.py --quick

      - name: JavaScript syntax check
        run: |
          for file in app/web/static/js/*.js; do
            node --check "$file"
          done
          node --check app/web/static/app.js

# ═══════════════════════════════════════════════════════════════════
# Job 2: Audit — pip-audit (不阻塞, 漏洞豁免为机器可读)
# ═══════════════════════════════════════════════════════════════════
  audit:
    name: "audit"
    needs: lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project + pip-audit
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,web]"
          pip install pip-audit

      - name: pip-audit vulnerability scan
        id: audit
        run: |
          pip-audit --strict --skip-editable -r <(pip freeze) 2>&1 | tee /tmp/pip-audit.log
          AUDIT_EXIT=$?
          if [ $AUDIT_EXIT -ne 0 ]; then
            echo "pip-audit found vulnerabilities (exit=$AUDIT_EXIT)"
            # Check if vulnerability exemptions file exists
            if [ -f "scripts/pip-audit-exemptions.json" ]; then
              echo "Exemptions file found — evaluating..."
              python scripts/check_pip_audit_exemptions.py /tmp/pip-audit.log || {
                echo "::warning::pip-audit vulnerabilities NOT covered by exemptions"
                exit $AUDIT_EXIT
              }
              echo "All vulnerabilities covered by exemptions"
            else
              echo "::warning::pip-audit found vulnerabilities (evaluate risk and add to scripts/pip-audit-exemptions.json)"
              exit $AUDIT_EXIT
            fi
          fi
        continue-on-error: true

# ═══════════════════════════════════════════════════════════════════
# Job 3: Test — 全矩阵 pytest + coverage ≥ 50%
# ═══════════════════════════════════════════════════════════════════
  test:
    name: "${{ matrix.os }} / py${{ matrix.python-version }}"
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install FFmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg --no-progress -y

      - name: Install Python dev deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]"

      - name: Run pytest with coverage (≥50%)
        shell: bash
        env:
          ASR_NO_MODEL_DOWNLOAD: "1"
        run: python scripts/run_coverage.py
        timeout-minutes: 15

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7
          if-no-files-found: error

      - name: Upload coverage report (backup — even if xml not found)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-raw-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            .coverage
            coverage.xml
          retention-days: 3
          if-no-files-found: warn

      - name: Upload pytest output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-stdout-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            /tmp/pytest-output-*.log
          retention-days: 7
          if-no-files-found: warn

# macOS runner 明显慢于 Linux/Windows，仅在 main 分支推送时执行。
# 独立 job 可使用真正的 job-level if；matrix.include 中的 if 只是普通数据字段。
  test-macos:
    name: "macos-latest / py3.12"
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint
    runs-on: macos-latest
    env:
      BLC_SKIP_C_EXTENSIONS: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Install Python dev deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]"

      - name: Run pytest with coverage (>=50%)
        shell: bash
        env:
          ASR_NO_MODEL_DOWNLOAD: "1"
        run: python scripts/run_coverage.py
        timeout-minutes: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-macos-latest-py3.12
          path: coverage.xml
          retention-days: 7
          if-no-files-found: error

      - name: Upload coverage report (backup - even if xml not found)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-raw-macos-latest-py3.12
          path: |
            .coverage
            coverage.xml
          retention-days: 3
          if-no-files-found: warn

      - name: Upload pytest output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-stdout-macos-latest-py3.12
          path: |
            /tmp/pytest-output-*.log
          retention-days: 7
          if-no-files-found: warn

# ═══════════════════════════════════════════════════════════════════
# Job 4: Portable 测试 + Payload 构建
# ═══════════════════════════════════════════════════════════════════
  portable-test:
    name: "portable-test"
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]"
          pip install pytest-cov pytest-timeout

      - name: Build Payload
        run: |
          cd packaging/portable
          python build_payload.py
        timeout-minutes: 10

      - name: Run Portable + Engine Pack tests
        run: |
          python -m pytest packaging/portable/tests/ \
            --tb=short -v \
            --timeout=120 \
            --fail-on-skip
        timeout-minutes: 10

      - name: Ruff check portable modules
        run: ruff check packaging/portable/src/ packaging/portable/tests/

# ═══════════════════════════════════════════════════════════════════
# Job 5: 汇总覆盖率
# ═══════════════════════════════════════════════════════════════════
  coverage-summary:
    name: "coverage summary"
    needs: [test, test-macos]
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    steps:
      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-artifacts
          merge-multiple: true

      - name: Show coverage files
        run: |
          echo "Coverage files collected:"
          if [ -d coverage-artifacts ]; then
            ls -la coverage-artifacts/ || echo "(empty)"
          else
            echo "(no coverage directory — test jobs were skipped)"
          fi

      - name: Summary
        run: |
          echo "All matrix tests complete. Coverage reports archived."
