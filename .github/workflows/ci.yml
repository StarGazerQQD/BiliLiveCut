# BiliLiveCut CI (V0.1.14.6)
# 触发: push/PR 到 main → lint → audit + test → coverage summary
#
# Job 结构:
#   lint       — ruff check + format + version + JS syntax (~20s, 快速失败)
#   audit      — pip-audit (~45s, 不阻塞)
#   test       — matrix 多平台多 Python → pytest + coverage (~3min)
#   coverage   — 汇总多矩阵覆盖率报告

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
      - ".gitignore"
      - "KNOWN_ISSUES.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
      - ".gitignore"
      - "KNOWN_ISSUES.md"
  schedule:
    # 每周一 08:00 UTC 跑一次依赖审计
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# ═══════════════════════════════════════════════════════════════════
# Job 1: Lint — 极速失败, 不通过则不跑后续任何 job
# ═══════════════════════════════════════════════════════════════════
jobs:
  lint:
    name: "lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check app/ tests/

      - name: Ruff format check
        run: ruff format --check app/ tests/

      - name: Check version consistency
        run: python scripts/check_version_consistency.py

      - name: JavaScript syntax check
        run: |
          for file in app/web/static/js/*.js; do
            node --check "$file"
          done
          node --check app/web/static/app.js

# ═══════════════════════════════════════════════════════════════════
# Job 2: Audit — 仅 PR/schedule 触发, 不阻塞 CI
# ═══════════════════════════════════════════════════════════════════
  audit:
    name: "audit"
    needs: lint
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project + pip-audit
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,web]"
          pip install pip-audit

      - name: pip-audit vulnerability scan
        run: |
          pip-audit --strict --skip-editable 2>&1 || {
            echo "::warning::pip-audit 发现漏洞 (评估风险后手工豁免)"
          }

# ═══════════════════════════════════════════════════════════════════
# Job 3: Test — 全矩阵 (需要 lint 通过)
# ═══════════════════════════════════════════════════════════════════
  test:
    name: "${{ matrix.os }} / py${{ matrix.python-version }}"
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
        include:
          # macOS: 仅 main 分支 push 时触发, 节省 Actions 额度
          - os: macos-latest
            python-version: "3.12"
            if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      # Ubuntu — FFmpeg via apt
      - name: Install FFmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      # Windows — FFmpeg via chocolatey
      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg --no-progress -y

      # macOS — FFmpeg via homebrew
      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      # Ubuntu / Windows — 国内镜像加速安装
      - name: Install Python dev deps (Linux/Windows)
        if: runner.os == 'Linux' || runner.os == 'Windows'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]" \
            --index-url https://mirrors.aliyun.com/pypi/simple/ \
            --extra-index-url https://pypi.tuna.tsinghua.edu.cn/simple \
            --trusted-host mirrors.aliyun.com \
            --trusted-host pypi.tuna.tsinghua.edu.cn

      # macOS — PyPI 直连, 跳过 C 扩展编译 (跨平台兼容)
      - name: Install Python dev deps (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          BLC_SKIP_C_EXTENSIONS: "1"
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]"

      - name: Install test extras
        shell: bash
        run: pip install python-multipart

      - name: Show installed packages
        shell: bash
        run: pip list

      # 全量 pytest + 覆盖率 (Mock 后端, 不下载真实模型)
      - name: Run pytest with coverage
        shell: bash
        env:
          ASR_NO_MODEL_DOWNLOAD: "1"
          WHISPER_MODEL: ""
        run: |
          pip install pytest-cov
          python -m pytest tests/ \
            -v --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=45
        timeout-minutes: 15

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload pytest output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-failure-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            .pytest_cache/**/*.log
          retention-days: 7
          if-no-files-found: ignore

# ═══════════════════════════════════════════════════════════════════
# Job 4: Portable 测试 (包含 Engine Pack)
# ═══════════════════════════════════════════════════════════════════
  portable-test:
    name: "portable-test"
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要 git history (Commit 731a31c)

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]"
          pip install pytest-cov pytest-timeout

      - name: Run Portable + Engine Pack tests
        run: |
          python -m pytest packaging/portable/tests/ \
            --tb=short -v \
            --timeout=120
        timeout-minutes: 10

      - name: Ruff check portable modules
        run: ruff check packaging/portable/src/ packaging/portable/tests/

# ═══════════════════════════════════════════════════════════════════
# Job 5: 汇总覆盖率 (可选, 展示总覆盖率; 需要 test 全部完成)
# ═══════════════════════════════════════════════════════════════════
  coverage-summary:
    name: "coverage summary"
    needs: test
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    steps:
      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-artifacts
          merge-multiple: true

      - name: Show coverage files
        run: |
          echo "Coverage files collected:"
          if [ -d coverage-artifacts ]; then
            ls -la coverage-artifacts/ || echo "(empty)"
          else
            echo "(no coverage directory — test jobs were skipped)"
          fi

      - name: Summary
        run: |
          echo "全矩阵测试完成。覆盖率报告已归档。"
