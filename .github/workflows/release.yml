# BiliLiveCut Release 工作流 (V0.1.14.11)
# 触发: 推送 v* 标签 (如 v0.1.14.11-alpha)
#   1) 全量测试 + release_audit
#   2) 构建源码包 (sdist + wheel)
#   3) 构建 Payload + 契约验证
#   4) 构建 Windows Lite EXE (PyInstaller)
#   5) Lite EXE smoke tests (--version / --diagnose / 空目录安装 / 联网安装 / 二次禁网)
#   6) Full Bundle 离线安装测试
#   7) 上传到 GitHub Release
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "发布 tag 名称 (如 v0.1.14.11-alpha, 必须 v* 格式且指向当前 SHA)"
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Job 0: Tag 校验 (workflow_dispatch)
  # ═══════════════════════════════════════════════════════════════════
  validate-tag:
    name: "Validate tag"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag input
        run: |
          TAG_INPUT="${{ github.event.inputs.tag }}"
          echo "Validating tag: $TAG_INPUT"

          # Must match v* pattern
          if [[ ! "$TAG_INPUT" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "FAIL: tag '$TAG_INPUT' does not match vX.Y.Z pattern"
            echo "Example: v0.1.14.11-alpha"
            exit 1
          fi

          # Must not be a branch name
          if git show-ref --verify "refs/heads/$TAG_INPUT" >/dev/null 2>&1; then
            echo "FAIL: '$TAG_INPUT' is a branch name, not a tag"
            exit 1
          fi

          # Must point to current HEAD
          TAG_SHA=$(git rev-list -n 1 "$TAG_INPUT" 2>/dev/null || echo "")
          HEAD_SHA=$(git rev-parse HEAD)
          if [ -z "$TAG_SHA" ]; then
            echo "FAIL: tag '$TAG_INPUT' does not exist"
            echo "Create it first: git tag $TAG_INPUT && git push origin $TAG_INPUT"
            exit 1
          fi
          if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
            echo "FAIL: tag '$TAG_INPUT' ($TAG_SHA) does not point to current HEAD ($HEAD_SHA)"
            echo "Ensure the tag is on the latest commit"
            exit 1
          fi

          echo "PASS: $TAG_INPUT → $TAG_SHA ✓"

  # ═══════════════════════════════════════════════════════════════════
  # Job 1: 全量测试 + release_audit
  # ═══════════════════════════════════════════════════════════════════
  test:
    name: "Test + Audit (py3.12 / ubuntu)"
    needs: []
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]" \
            --index-url https://mirrors.aliyun.com/pypi/simple/ \
            --extra-index-url https://pypi.tuna.tsinghua.edu.cn/simple \
            --trusted-host mirrors.aliyun.com \
            --trusted-host pypi.tuna.tsinghua.edu.cn
          pip install python-multipart

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Ruff format check
        run: ruff format --check app/ tests/

      - name: Version consistency
        run: python scripts/check_version_consistency.py

      - name: Release audit (full)
        run: python scripts/release_audit.py

      - name: Run pytest
        env:
          ASR_NO_MODEL_DOWNLOAD: "1"
          WHISPER_MODEL: ""
        run: python -m pytest tests/ -v --tb=short
        timeout-minutes: 15

  # ═══════════════════════════════════════════════════════════════════
  # Job 2: 构建源码分发包 (sdist + wheel)
  # ═══════════════════════════════════════════════════════════════════
  build-sdist:
    name: "Build source packages"
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build wheel

      - name: Extract tag version
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build sdist
        run: python -m build --sdist --outdir dist/

      - name: Build wheel
        run: python -m build --wheel --outdir dist/

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Upload sdist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════
  # Job 3: 构建 Payload + 契约验证
  # ═══════════════════════════════════════════════════════════════════
  build-payload:
    name: "Build Payload + verify"
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build source payload
        run: |
          pip install setuptools
          cd packaging/portable
          python build_payload.py
        timeout-minutes: 10

      - name: Verify Payload Manifest/ZIP contract
        run: |
          cd packaging/portable
          python -c "
import json, sys, zipfile
m = json.load(open('dist/payload/payload_manifest.json'))
zp = 'dist/payload/source_payload.zip'
with zipfile.ZipFile(zp) as zf:
    zf_count = sum(1 for n in zf.namelist() if not n.endswith('/'))
mf_count = m['file_count']
mf_files = len(m['files'])
assert zf_count == mf_count == mf_files, f'Count mismatch: ZIP={zf_count} MF={mf_count} files={mf_files}'
assert m['format_version'] == 5, f'format_version={m[\"format_version\"]}'
assert m['core_source_commit_short'] == '731a31c'
assert m['target_platform'] == 'win_x64'
assert 'generated_at' not in m, 'manifest has generated_at (breaks reproducibility)'
print(f'Payload contract OK: {mf_count} files, SHA={m[\"payload_sha256\"][:16]}...')
"
        timeout-minutes: 2

      - name: Upload Payload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: payload
          path: |
            packaging/portable/dist/payload/source_payload.zip
            packaging/portable/dist/payload/payload_manifest.json
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════
  # Job 4: 构建 Windows Lite EXE (PyInstaller) + Full Bundle
  # ═══════════════════════════════════════════════════════════════════
  build-windows-lite:
    name: "Build Windows Lite EXE"
    needs: build-payload
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Payload
        uses: actions/download-artifact@v4
        with:
          name: payload
          path: packaging/portable/dist/payload/

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[dev,web]"
        timeout-minutes: 10

      - name: Build Lite EXE
        env:
          BLC_FIXTURE_BUILD: "1"
        run: |
          cd packaging/portable
          python build_exe.py
        timeout-minutes: 15

      - name: Download embeddable Python 3.12
        shell: pwsh
        run: |
          Write-Output "::group::Downloading embeddable Python 3.12"
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.12.8/python-3.12.8-embed-amd64.zip" `
            -OutFile "$env:RUNNER_TEMP\python-embed.zip"
          New-Item -ItemType Directory -Path portable-python -Force
          Expand-Archive -Path "$env:RUNNER_TEMP\python-embed.zip" -DestinationPath portable-python -Force
          Write-Output "::endgroup::"
        timeout-minutes: 5

      - name: Download FFmpeg static binaries
        shell: pwsh
        run: |
          Write-Output "::group::Downloading FFmpeg"
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" `
            -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\ffmpeg.zip" -DestinationPath "$env:RUNNER_TEMP\ffmpeg-extracted" -Force
          New-Item -ItemType Directory -Path bin -Force
          $ffmpegDir = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg-extracted" -Directory | Select-Object -First 1
          Copy-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe" "bin\ffmpeg.exe"
          Copy-Item "$($ffmpegDir.FullName)\bin\ffprobe.exe" "bin\ffprobe.exe"
          Write-Output "::endgroup::"
        timeout-minutes: 5

      - name: Download Windows wheels from lock files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path vendor\wheels -Force
          python -m pip download -r packaging/portable/locks/requirements-runtime-py311-win-x64.lock -d vendor\wheels --only-binary=:all: --platform win_amd64 --python-version 3.11
          python -m pip download -r packaging/portable/locks/requirements-runtime-py312-win-x64.lock -d vendor\wheels --only-binary=:all: --platform win_amd64 --python-version 3.12
          $wheelCount = @(Get-ChildItem vendor\wheels\*.whl -ErrorAction SilentlyContinue).Count
          Write-Output "Wheels downloaded: $wheelCount"
          if ($wheelCount -eq 0) {
            Write-Error "FATAL: No wheels downloaded"
            exit 1
          }
        timeout-minutes: 15

      - name: Build Full Bundle
        run: |
          cd packaging/portable
          python build_full_bundle.py
        timeout-minutes: 5

      - name: Upload Lite EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-lite
          path: |
            packaging/portable/dist/lite/*.exe
            packaging/portable/dist/lite/build-manifest.json
            packaging/portable/dist/lite/SHA256SUMS.txt
            packaging/portable/dist/lite/CRC32SUMS.txt
          retention-days: 1

      - name: Upload Full ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-full
          path: |
            packaging/portable/dist/full/*.zip
            packaging/portable/dist/full/build-manifest.json
            packaging/portable/dist/full/SHA256SUMS.txt
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════
  # Job 5: Lite EXE smoke tests + Full Bundle installation test
  # ═══════════════════════════════════════════════════════════════════
  smoke-test:
    name: "Smoke tests (Lite + Full)"
    needs: build-windows-lite
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Lite EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-lite
          path: smoke/lite/

      - name: Download Full ZIP
        uses: actions/download-artifact@v4
        with:
          name: windows-full
          path: smoke/full/

      - name: Lite EXE --version
        shell: pwsh
        run: |
          $exe = Get-ChildItem smoke/lite/*.exe | Select-Object -First 1
          if (-not $exe) { Write-Error "Lite EXE not found"; exit 1 }
          & $exe.FullName --version 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) { Write-Error "Lite EXE --version failed (exit=$LASTEXITCODE)"; exit 1 }
        timeout-minutes: 5

      - name: Lite EXE --diagnose
        shell: pwsh
        run: |
          $exe = Get-ChildItem smoke/lite/*.exe | Select-Object -First 1
          & $exe.FullName --diagnose 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) { Write-Warning "--diagnose returned non-zero (expected without models)" }
        timeout-minutes: 5

      - name: Lite fresh-install to empty directory
        shell: pwsh
        run: |
          $tmpDir = Join-Path $env:RUNNER_TEMP "blc-lite-test-$(Get-Random)"
          New-Item -ItemType Directory -Path $tmpDir -Force
          $exe = Get-ChildItem smoke/lite/*.exe | Select-Object -First 1
          Copy-Item $exe.FullName "$tmpDir\BiliLiveCut.exe"
          Push-Location $tmpDir
          try {
            & ".\BiliLiveCut.exe" --version 2>&1 | Out-Host
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Lite version check in empty dir returned $LASTEXITCODE"
            }
          }
          finally {
            Pop-Location
            Remove-Item -Recurse -Force $tmpDir -ErrorAction SilentlyContinue
          }
        timeout-minutes: 5

      - name: Full Bundle offline install test
        shell: pwsh
        run: |
          $tmpDir = Join-Path $env:RUNNER_TEMP "blc-full-test-$(Get-Random)"
          New-Item -ItemType Directory -Path $tmpDir -Force
          $fullZip = Get-ChildItem smoke/full/*.zip | Select-Object -First 1
          if (-not $fullZip) { Write-Error "Full ZIP not found"; exit 1 }
          Expand-Archive -Path $fullZip.FullName -DestinationPath $tmpDir -Force
          Write-Output "Full bundle extracted to $tmpDir"
          Get-ChildItem $tmpDir -Recurse -Depth 1 | ForEach-Object { $_.Name }
          # Verify key components exist
          $hasExe = Test-Path "$tmpDir\BiliLiveCut-Portable.exe"
          $hasPython = (Test-Path "$tmpDir\portable-python") -or (Test-Path "$tmpDir\python")
          $hasWheels = Test-Path "$tmpDir\vendor\wheels"
          $hasFfmpeg = (Get-ChildItem "$tmpDir\bin\ffmpeg.exe" -ErrorAction SilentlyContinue) -ne $null
          Write-Output "EXE=$hasExe Python=$hasPython Wheels=$hasWheels FFmpeg=$hasFfmpeg"
          if (-not $hasExe) { Write-Error "Full ZIP missing Lite EXE"; exit 1 }
          if (-not $hasWheels) { Write-Error "Full ZIP missing vendor/wheels"; exit 1 }
          Write-Output "Full bundle structure OK"
          Remove-Item -Recurse -Force $tmpDir -ErrorAction SilentlyContinue
        timeout-minutes: 5

      - name: app.cli import smoke test
        shell: pwsh
        run: |
          python -c "from app.cli import main; print('app.cli import OK')" 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) { Write-Error "app.cli import failed"; exit 1 }
        timeout-minutes: 2

  # ═══════════════════════════════════════════════════════════════════
  # Job 6: 创建 GitHub Release
  # ═══════════════════════════════════════════════════════════════════
  release:
    name: "Create GitHub Release"
    needs: [build-sdist, build-windows-lite, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Download Lite EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-lite
          path: dist/

      - name: Download Full ZIP
        uses: actions/download-artifact@v4
        with:
          name: windows-full
          path: dist/

      - name: Generate merged top-level checksums
        run: |
          cd dist
          echo "=== SHA256SUMS ==="
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
          sha256sum -c SHA256SUMS
          echo "=== CRC32SUMS ==="
          for f in *.exe *.zip; do
            if [ -f "$f" ]; then
              crc32 "$f" | awk '{printf "%s  %s\n", $1, $2}' >> CRC32SUMS
            fi
          done
          if [ -f CRC32SUMS ]; then
            cat CRC32SUMS
          else
            echo "(no CRC32SUMS — crc32 util not available on this runner)"
          fi
        timeout-minutes: 2

      - name: Extract tag version
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${{ steps.tag.outputs.tag }}"
          cat > /tmp/extract_notes.py << 'PYEOF'
          import re, sys, os
          version = os.environ["RELEASE_VERSION"]
          with open("CHANGELOG.md", "r", encoding="utf-8") as f:
              content = f.read()
          escaped = re.escape(version)
          pattern = re.compile(rf"(## {escaped}.+?)(?=\n## |\Z)", re.DOTALL)
          m = pattern.search(content)
          if m:
              print(m.group(1).strip())
          else:
              print(f"Release {version}")
          PYEOF
          RELEASE_VERSION="$VERSION" python /tmp/extract_notes.py > /tmp/release_notes.md
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          body_path: /tmp/release_notes.md
          files: |
            dist/*
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, 'alpha') || contains(steps.tag.outputs.tag, 'beta') || contains(steps.tag.outputs.tag, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
