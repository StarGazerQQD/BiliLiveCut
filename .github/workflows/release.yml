# BiliLiveCut Release 工作流 (V0.1.15.2)
# 触发: 推送 v* 标签 (如 v0.1.15.2-alpha)
#   1) 全量测试 + release_audit
#   2) 构建源码包 (sdist + wheel)
#   3) 构建 Payload + 契约验证
#   4) 构建 Windows Lite EXE (PyInstaller)
#   5) Lite EXE smoke tests (--version / --doctor / 空目录安装 / 联网安装 / 二次禁网)
#   6) Full Bundle 离线安装测试
#   7) 上传到 GitHub Release
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "发布 tag 名称 (如 v0.1.15.2-alpha, 必须 v* 格式且指向当前 SHA)"
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Job 0: Tag 校验 (workflow_dispatch)
  # ═══════════════════════════════════════════════════════════════════
  validate-tag:
    name: "Validate tag"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag input
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_INPUT="${{ github.event.inputs.tag }}"
          else
            TAG_INPUT="${GITHUB_REF#refs/tags/}"
          fi
          echo "Validating tag: $TAG_INPUT"

          # Must match v* pattern
          if [[ ! "$TAG_INPUT" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "FAIL: tag '$TAG_INPUT' does not match vX.Y.Z pattern"
            echo "Example: v0.1.15.2-alpha"
            exit 1
          fi

          # Must not be a branch name
          if git show-ref --verify "refs/heads/$TAG_INPUT" >/dev/null 2>&1; then
            echo "FAIL: '$TAG_INPUT' is a branch name, not a tag"
            exit 1
          fi

          # Must point to current HEAD
          TAG_SHA=$(git rev-list -n 1 "$TAG_INPUT" 2>/dev/null || echo "")
          HEAD_SHA=$(git rev-parse HEAD)
          if [ -z "$TAG_SHA" ]; then
            echo "FAIL: tag '$TAG_INPUT' does not exist"
            echo "Create it first: git tag $TAG_INPUT && git push origin $TAG_INPUT"
            exit 1
          fi
          if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
            echo "FAIL: tag '$TAG_INPUT' ($TAG_SHA) does not point to current HEAD ($HEAD_SHA)"
            echo "Ensure the tag is on the latest commit"
            exit 1
          fi

          echo "PASS: $TAG_INPUT → $TAG_SHA ✓"

  # ═══════════════════════════════════════════════════════════════════
  # Job 1: 全量测试 + release_audit
  # ═══════════════════════════════════════════════════════════════════
  test:
    name: "Test + Audit (py3.12 / ubuntu)"
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]" \
            --index-url https://mirrors.aliyun.com/pypi/simple/ \
            --extra-index-url https://pypi.tuna.tsinghua.edu.cn/simple \
            --trusted-host mirrors.aliyun.com \
            --trusted-host pypi.tuna.tsinghua.edu.cn
          python setup.py build_ext --inplace
      - name: Ruff lint
        run: python scripts/run_ruff.py check

      - name: Ruff format check
        run: python scripts/run_ruff.py format

      - name: Version consistency
        run: python scripts/check_version_consistency.py

      - name: Release audit (full)
        run: python scripts/release_audit.py

      - name: Run pytest
        env:
          ASR_NO_MODEL_DOWNLOAD: "1"
        run: python -m pytest tests/ -v --tb=short --fail-on-skip
        timeout-minutes: 15

  # ═══════════════════════════════════════════════════════════════════
  # Job 2: 构建源码分发包 (sdist + wheel)
  # ═══════════════════════════════════════════════════════════════════
  build-sdist:
    name: "Build source packages"
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build wheel check-manifest twine Cython==3.2.8

      - name: Validate source manifest
        run: check-manifest --no-build-isolation --ignore ".cursor/*,.cursor/rules/*,.dockerignore"

      - name: Extract tag version
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build sdist
        run: python -m build --sdist --outdir dist/

      - name: Build wheel
        run: python -m build --wheel --outdir dist/

      - name: Validate distribution metadata
        run: python -m twine check --strict dist/*

      - name: Reject workspace contamination in source archive
        run: |
          SDIST="$(find dist -maxdepth 1 -name '*.tar.gz' -print -quit)"
          test -n "$SDIST"
          if tar -tzf "$SDIST" | grep -E '/(\.model_cache|target|build|dist)/|coverage\.xml|runtime/current\.json'; then
            echo "Source archive contains workspace/build contamination"
            exit 1
          fi

      - name: Smoke test installed wheel with Web extra
        run: |
          WHEEL="$(find "$GITHUB_WORKSPACE/dist" -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$WHEEL"
          python -m venv "$RUNNER_TEMP/blc-wheel-smoke"
          "$RUNNER_TEMP/blc-wheel-smoke/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/blc-wheel-smoke/bin/pip" install "${WHEEL}[web]"
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/blc-wheel-smoke/bin/python" -c "import app.web.main as web; import config; from pathlib import Path; root=Path(web.__file__).parent; cfg=Path(config.__file__).parent; assert (root/'templates'/'dashboard.html').is_file(); assert (root/'static'/'app.js').is_file(); assert (cfg/'scoring.yaml').is_file(); assert (cfg/'keywords.zh.txt').is_file(); print('wheel runtime assets smoke OK')"
          "$RUNNER_TEMP/blc-wheel-smoke/bin/blc" version

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Upload sdist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════
  # Job 3: 构建 Payload + 契约验证
  # ═══════════════════════════════════════════════════════════════════
  build-payload:
    name: "Build Payload + verify"
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build source payload
        run: |
          python -m pip install --upgrade pip
          pip install setuptools Cython==3.2.8
          cd packaging/portable
          python build_payload.py
        timeout-minutes: 20

      - name: Verify Payload Manifest/ZIP contract
        shell: pwsh
        run: |
          @'
          import json
          import zipfile

          manifest = json.load(open("packaging/portable/dist/payload/payload_manifest.json"))
          version_config = json.load(open("packaging/portable/config/version.json"))
          zip_path = "packaging/portable/dist/payload/source_payload.zip"
          with zipfile.ZipFile(zip_path) as zip_file:
              entries = set(zip_file.namelist())
              zip_count = sum(1 for name in entries if not name.endswith("/"))
          manifest_count = manifest["file_count"]
          manifest_files = len(manifest["files"])
          assert zip_count == manifest_count == manifest_files, (
              f"Count mismatch: ZIP={zip_count} MF={manifest_count} files={manifest_files}"
          )
          assert manifest["format_version"] == 5
          assert manifest["core_source_commit"] == version_config["source_commit_full"]
          assert manifest["core_source_commit_short"] == version_config["source_commit_short"]
          assert manifest["target_platform"] == "win_x64"
          assert "generated_at" not in manifest, "manifest has generated_at (breaks reproducibility)"
          abi = manifest["python_abi"]
          required_native = {
              f"app/analysis/_c_speedups.{abi}-win_amd64.pyd",
              f"app/analysis/_speedups_round2.{abi}-win_amd64.pyd",
              "app/analysis/_rust_cluster.pyd",
          }
          missing_native = sorted(required_native - entries)
          assert not missing_native, f"Missing Windows native modules: {missing_native}"
          foreign_native = sorted(name for name in entries if name.endswith((".so", ".dll")))
          assert not foreign_native, f"Foreign native modules in Windows Payload: {foreign_native}"
          print(f"Payload contract OK: {manifest_count} files, SHA={manifest['payload_sha256'][:16]}...")
          '@ | python -
        timeout-minutes: 2

      - name: Upload Payload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: payload
          path: |
            packaging/portable/dist/payload/source_payload.zip
            packaging/portable/dist/payload/payload_manifest.json
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════
  # Job 4: 构建 Windows Lite EXE (PyInstaller) + Full Bundle
  # ═══════════════════════════════════════════════════════════════════
  build-windows-lite:
    name: "Build Windows Lite EXE"
    needs: build-payload
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.8"

      - name: Prepare relocatable Python 3.12 runtime
        shell: pwsh
        run: |
          $pythonExe = (Get-Command python).Source
          $pythonRoot = Split-Path -Parent $pythonExe
          New-Item -ItemType Directory -Path portable-python -Force | Out-Null
          Get-ChildItem -LiteralPath $pythonRoot -Force | Copy-Item -Destination portable-python -Recurse -Force
          & portable-python\python.exe -c "import sys, venv; print(sys.version); print('venv module OK')"
          if ($LASTEXITCODE -ne 0) { Write-Error "Relocated Python runtime is not executable"; exit 1 }
        timeout-minutes: 5

      - name: Download Payload
        uses: actions/download-artifact@v4
        with:
          name: payload
          path: packaging/portable/dist/payload/

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller setuptools==83.0.0 wheel==0.46.3
          pip install -e ".[dev,web]"
        timeout-minutes: 10

      - name: Build Lite EXE
        run: |
          cd packaging/portable
          python build_exe.py --without-engine-pack
        timeout-minutes: 15

      - name: Download FFmpeg static binaries
        shell: pwsh
        run: |
          Write-Output "::group::Downloading FFmpeg"
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" `
            -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\ffmpeg.zip" -DestinationPath "$env:RUNNER_TEMP\ffmpeg-extracted" -Force
          New-Item -ItemType Directory -Path bin -Force
          $ffmpegDir = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg-extracted" -Directory | Select-Object -First 1
          Copy-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe" "bin\ffmpeg.exe"
          Copy-Item "$($ffmpegDir.FullName)\bin\ffprobe.exe" "bin\ffprobe.exe"
          Write-Output "::endgroup::"
        timeout-minutes: 5

      - name: Download Windows wheels from lock files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path vendor\wheels -Force | Out-Null
          $sourceWheels = Join-Path $env:RUNNER_TEMP "blc-source-wheels"
          python scripts/build_portable_runtime_wheels.py `
            --output-dir $sourceWheels `
            --cache-dir (Join-Path $env:RUNNER_TEMP "blc-runtime-sdists")
          if ($LASTEXITCODE -ne 0) { Write-Error "Source-only wheel build failed"; exit 1 }

          python -m pip download --require-hashes `
            -r packaging/portable/locks/requirements-runtime-py311-win-x64.lock `
            -d vendor\wheels --only-binary=:all: --platform win_amd64 `
            --python-version 3.11 --implementation cp --abi cp311 --find-links $sourceWheels
          if ($LASTEXITCODE -ne 0) { Write-Error "Python 3.11 locked wheel download failed"; exit 1 }

          python -m pip download --require-hashes `
            -r packaging/portable/locks/requirements-runtime-py312-win-x64.lock `
            -d vendor\wheels --only-binary=:all: --platform win_amd64 `
            --python-version 3.12 --implementation cp --abi cp312 --find-links $sourceWheels
          if ($LASTEXITCODE -ne 0) { Write-Error "Python 3.12 locked wheel download failed"; exit 1 }

          $wheelCount = @(Get-ChildItem vendor\wheels\*.whl -ErrorAction SilentlyContinue).Count
          Write-Output "Wheels downloaded: $wheelCount"
          if ($wheelCount -lt 110) {
            Write-Error "FATAL: Incomplete wheelhouse ($wheelCount wheels, expected at least 110)"
            exit 1
          }
        timeout-minutes: 20

      - name: Build Full Bundle
        run: |
          cd packaging/portable
          python build_full_bundle.py
        timeout-minutes: 5

      - name: Set up Python 3.11 for offline validation
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python 3.11 offline installation
        shell: pwsh
        run: |
          $venv = Join-Path $env:RUNNER_TEMP "blc-offline-py311"
          python -m venv $venv
          if ($LASTEXITCODE -ne 0) { Write-Error "Python 3.11 venv creation failed"; exit 1 }
          $venvPython = Join-Path $venv "Scripts\python.exe"
          & $venvPython -m pip install --no-index --find-links vendor\wheels --require-hashes `
            -r packaging/portable/locks/requirements-runtime-py311-win-x64.lock
          if ($LASTEXITCODE -ne 0) { Write-Error "Python 3.11 offline install failed"; exit 1 }
          & $venvPython -m pip check
          if ($LASTEXITCODE -ne 0) { Write-Error "Python 3.11 pip check failed"; exit 1 }
          & $venvPython -c "import brotli, fastapi, funasr, loguru, modelscope, playwright, pydantic_settings, sqlmodel, torch, torchaudio, uvicorn"
          if ($LASTEXITCODE -ne 0) { Write-Error "Python 3.11 runtime import smoke failed"; exit 1 }
        timeout-minutes: 15

      - name: Upload Lite EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-lite
          path: |
            packaging/portable/dist/lite/*.exe
            packaging/portable/dist/lite/build-manifest.json
            packaging/portable/dist/lite/SHA256SUMS.txt
            packaging/portable/dist/lite/CRC32SUMS.txt
          retention-days: 1

      - name: Upload Full ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-full
          path: |
            packaging/portable/dist/full/*.zip
            packaging/portable/dist/full/build-manifest.json
            packaging/portable/dist/full/SHA256SUMS.txt
            packaging/portable/dist/full/CRC32SUMS.txt
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════
  # Job 5: Lite EXE smoke tests + Full Bundle installation test
  # ═══════════════════════════════════════════════════════════════════
  smoke-test:
    name: "Smoke tests (Lite + Full)"
    needs: build-windows-lite
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Lite EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-lite
          path: smoke/lite/

      - name: Download Full ZIP
        uses: actions/download-artifact@v4
        with:
          name: windows-full
          path: smoke/full/

      - name: Download Payload
        uses: actions/download-artifact@v4
        with:
          name: payload
          path: smoke/payload/

      - name: Lite EXE --version
        shell: pwsh
        run: |
          $exe = Get-ChildItem smoke/lite/*.exe | Select-Object -First 1
          if (-not $exe) { Write-Error "Lite EXE not found"; exit 1 }
          & $exe.FullName --version 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) { Write-Error "Lite EXE --version failed (exit=$LASTEXITCODE)"; exit 1 }
        timeout-minutes: 5

      - name: Lite EXE --doctor
        shell: pwsh
        run: |
          $exe = Get-ChildItem smoke/lite/*.exe | Select-Object -First 1
          & $exe.FullName --doctor 2>&1 | Out-Host
          if ($LASTEXITCODE -ne 0) { Write-Error "Lite EXE --doctor failed (exit=$LASTEXITCODE)"; exit 1 }
        timeout-minutes: 5

      - name: Lite fresh-install to empty directory
        shell: pwsh
        run: |
          $tmpDir = Join-Path $env:RUNNER_TEMP "blc-lite-test-$(Get-Random)"
          New-Item -ItemType Directory -Path $tmpDir -Force
          $exe = Get-ChildItem smoke/lite/*.exe | Select-Object -First 1
          Copy-Item $exe.FullName "$tmpDir\BiliLiveCut.exe"
          Push-Location $tmpDir
          try {
            & ".\BiliLiveCut.exe" --version 2>&1 | Out-Host
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Lite version check in empty dir returned $LASTEXITCODE"
            }
          }
          finally {
            Pop-Location
            Remove-Item -Recurse -Force $tmpDir -ErrorAction SilentlyContinue
          }
        timeout-minutes: 5

      - name: Full Bundle offline install test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tmpDir = Join-Path $env:RUNNER_TEMP "blc-full-test-$(Get-Random)"
          New-Item -ItemType Directory -Path $tmpDir -Force
          $launcherProcess = $null
          try {
            $fullZip = Get-ChildItem smoke/full/*.zip | Select-Object -First 1
            if (-not $fullZip) { throw "Full ZIP not found" }
            $payloadZip = Get-ChildItem smoke/payload/source_payload.zip | Select-Object -First 1
            if (-not $payloadZip) { throw "Payload ZIP not found" }
            Expand-Archive -Path $fullZip.FullName -DestinationPath $tmpDir -Force
            $bundleRoot = Get-ChildItem $tmpDir -Directory | Where-Object {
              $_.Name -like "BiliLiveCut-Portable-Full-*"
            } | Select-Object -First 1
            if (-not $bundleRoot) { throw "Full ZIP missing bundle root directory" }

            $root = $bundleRoot.FullName
            foreach ($required in @(
              "$root\BiliLiveCut-Portable.exe",
              "$root\portable-python\python.exe",
              "$root\bin\ffmpeg.exe",
              "$root\bin\ffprobe.exe"
            )) {
              if (-not (Test-Path $required)) { throw "Full ZIP missing $required" }
            }
            $wheelCount = @(Get-ChildItem "$root\vendor\wheels\*.whl" -ErrorAction SilentlyContinue).Count
            if ($wheelCount -lt 110) { throw "Full ZIP wheelhouse incomplete: $wheelCount" }

            $runtimeSource = "$root\runtime\smoke-source"
            Expand-Archive -Path $payloadZip.FullName -DestinationPath $runtimeSource -Force
            if (-not (Test-Path "$runtimeSource\app\cli.py")) { throw "Payload missing app/cli.py" }

            $venv = "$root\.venv"
            & "$root\portable-python\python.exe" -m venv $venv
            if ($LASTEXITCODE -ne 0) { throw "Bundled Python cannot create a venv" }
            $venvPython = "$venv\Scripts\python.exe"
            $launcherSource = (Resolve-Path "packaging/portable/src").Path
            $env:PYTHONPATH = $launcherSource
            $env:BLC_SMOKE_VENV_PYTHON = $venvPython
            $env:BLC_SMOKE_APP_ROOT = $root
            $env:BLC_SMOKE_SOURCE_DIR = $runtimeSource
            Push-Location $root
            try {
              & $venvPython -c "import os; from pathlib import Path; from blc_portable.launcher.main import install_dependencies; install_dependencies(Path(os.environ['BLC_SMOKE_VENV_PYTHON']), Path(os.environ['BLC_SMOKE_APP_ROOT']), source_dir=Path(os.environ['BLC_SMOKE_SOURCE_DIR']))"
            }
            finally {
              Pop-Location
            }
            if ($LASTEXITCODE -ne 0) { throw "Full Bundle launcher dependency install failed" }
            & $venvPython -m pip check
            if ($LASTEXITCODE -ne 0) { throw "Full Bundle pip check failed" }
            & $venvPython -c "import brotli, fastapi, funasr, loguru, modelscope, playwright, pydantic_settings, sqlmodel, torch, torchaudio, uvicorn"
            if ($LASTEXITCODE -ne 0) { throw "Full Bundle runtime import smoke failed" }
            $env:PYTHONPATH = "$runtimeSource$([System.IO.Path]::PathSeparator)$launcherSource"
            Push-Location $root
            try {
              & $venvPython -c "from pathlib import Path; from app.cli import app; import app.cli; source = Path(r'$runtimeSource').resolve(); actual = Path(app.cli.__file__).resolve(); assert actual.is_relative_to(source), f'app.cli loaded from {actual}'; print('app.cli import OK:', actual)"
              if ($LASTEXITCODE -ne 0) { throw "Full Bundle app.cli import failed" }
              & $venvPython -c "from app.accelerators import dispatcher as d; assert d.get_backend() == 'C', d.get_backend(); assert d.get_cluster_backend() == 'Rust+rayon', d.get_cluster_backend(); assert d.danmaku_baseline_rate.__module__ == 'app.analysis._speedups_round2', d.danmaku_baseline_rate.__module__; assert d.group_srt_blocks.__module__ == 'app.analysis._speedups_round2', d.group_srt_blocks.__module__; print('Full Bundle native acceleration OK')"
            }
            finally {
              Pop-Location
            }
            if ($LASTEXITCODE -ne 0) { throw "Full Bundle native acceleration import failed" }
            Write-Output "Full bundle offline installation OK ($wheelCount wheels)"

            Remove-Item Env:PYTHONPATH -ErrorAction SilentlyContinue
            & python packaging/portable/build_engine_pack.py --fixture
            if ($LASTEXITCODE -ne 0) { throw "Fixture Engine Pack build failed" }
            $fixturePack = Get-ChildItem packaging/portable/dist/engine-pack/BiliLiveCut-EnginePack-*.zip |
              Sort-Object LastWriteTime -Descending | Select-Object -First 1
            if (-not $fixturePack) { throw "Fixture Engine Pack not found" }

            $stdoutLog = "$root\frozen-launcher.stdout.log"
            $stderrLog = "$root\frozen-launcher.stderr.log"
            $launcherProcess = Start-Process -FilePath "$root\BiliLiveCut-Portable.exe" `
              -ArgumentList @("--offline", "--engine-pack", $fixturePack.FullName) `
              -WorkingDirectory $root -RedirectStandardOutput $stdoutLog -RedirectStandardError $stderrLog `
              -PassThru -WindowStyle Hidden
            $installedManifest = "$root\models\engine-pack-installed.json"
            $deadline = (Get-Date).AddMinutes(5)
            while ((Get-Date) -lt $deadline -and -not (Test-Path $installedManifest) -and -not $launcherProcess.HasExited) {
              Start-Sleep -Seconds 2
              $launcherProcess.Refresh()
            }
            Get-Content $stdoutLog -ErrorAction SilentlyContinue | Out-Host
            Get-Content $stderrLog -ErrorAction SilentlyContinue | Out-Host
            if (-not (Test-Path $installedManifest)) {
              throw "Frozen Full launcher did not complete Fixture Engine Pack preparation"
            }
            Write-Output "Frozen Full launcher model preparation OK"
          }
          finally {
            if ($launcherProcess -and -not $launcherProcess.HasExited) {
              Get-CimInstance Win32_Process | Where-Object {
                $_.ParentProcessId -eq $launcherProcess.Id
              } | ForEach-Object {
                Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue
              }
              Stop-Process -Id $launcherProcess.Id -Force -ErrorAction SilentlyContinue
            }
            Remove-Item -Recurse -Force $tmpDir -ErrorAction SilentlyContinue
          }
        timeout-minutes: 25

  # ═══════════════════════════════════════════════════════════════════
  # Job 6: 创建 GitHub Release
  # ═══════════════════════════════════════════════════════════════════
  release:
    name: "Create GitHub Release"
    needs: [build-sdist, build-windows-lite, smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/sdist/

      - name: Download Lite EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-lite
          path: dist/lite/

      - name: Download Full ZIP
        uses: actions/download-artifact@v4
        with:
          name: windows-full
          path: dist/full/

      - name: Generate merged top-level checksums
        run: |
          mkdir -p release-assets
          cp dist/sdist/*.tar.gz release-assets/
          cp dist/sdist/*.whl release-assets/
          cp dist/lite/*.exe release-assets/
          cp dist/lite/build-manifest.json release-assets/lite-build-manifest.json
          cp dist/full/*.zip release-assets/
          cp dist/full/build-manifest.json release-assets/full-build-manifest.json
          cd release-assets
          echo "=== SHA256SUMS ==="
          sha256sum *.tar.gz *.whl *.exe *.zip *-build-manifest.json > SHA256SUMS.txt
          cat SHA256SUMS.txt
          sha256sum -c SHA256SUMS.txt
          echo "=== CRC32SUMS ==="
          python - <<'PY'
          import pathlib, zlib
          lines = []
          for path in sorted([*pathlib.Path('.').glob('*.exe'), *pathlib.Path('.').glob('*.zip')]):
              crc = 0
              with path.open('rb') as fh:
                  for chunk in iter(lambda: fh.read(1024 * 1024), b''):
                      crc = zlib.crc32(chunk, crc)
              lines.append(f"{crc & 0xFFFFFFFF:08X}  {path.name}")
          pathlib.Path('CRC32SUMS.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          cat CRC32SUMS.txt
        timeout-minutes: 2

      - name: Extract tag version
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${{ steps.tag.outputs.tag }}"
          cat > /tmp/extract_notes.py << 'PYEOF'
          import re, sys, os
          version = os.environ["RELEASE_VERSION"].removeprefix("v").split("-", 1)[0]
          with open("CHANGELOG.md", "r", encoding="utf-8") as f:
              content = f.read()
          escaped = re.escape(version)
          pattern = re.compile(rf"(##\s+V{escaped}(?:\s+Alpha)?.+?)(?=\n## |\Z)", re.DOTALL | re.IGNORECASE)
          m = pattern.search(content)
          if m:
              print(m.group(1).strip())
          else:
              print(f"Release {version}")
          PYEOF
          RELEASE_VERSION="$VERSION" python /tmp/extract_notes.py > /tmp/release_notes.md
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          body_path: /tmp/release_notes.md
          files: |
            release-assets/*
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, 'alpha') || contains(steps.tag.outputs.tag, 'beta') || contains(steps.tag.outputs.tag, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
