# BiliLiveCut Release 工作流
# 触发: 推送 v* 标签 (如 v0.1.14.11-alpha)
#   1) 全量测试
#   2) 构建源码包 (sdist + wheel + win-source-zip)
#   3) 构建 Payload (source_payload.zip)
#   4) 构建 Windows Lite EXE (PyInstaller)
#   5) 上传到 GitHub Release
# 注意: 不上传到 PyPI
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "发布 tag 名称 (如 v0.1.14.11-alpha)"
        required: true

permissions:
  contents: write   # 创建 Release + 上传资产
  actions: read

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Job 1: 全量测试
  # ═══════════════════════════════════════════════════════════════════
  test:
    name: "Test (py3.12 / ubuntu)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]" \
            --index-url https://mirrors.aliyun.com/pypi/simple/ \
            --extra-index-url https://pypi.tuna.tsinghua.edu.cn/simple \
            --trusted-host mirrors.aliyun.com \
            --trusted-host pypi.tuna.tsinghua.edu.cn
          pip install python-multipart

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Ruff format check
        run: ruff format --check app/ tests/

      - name: Run pytest
        env:
          ASR_NO_MODEL_DOWNLOAD: "1"
          WHISPER_MODEL: ""
        run: python -m pytest tests/ -v --tb=short
        timeout-minutes: 15

  # ═══════════════════════════════════════════════════════════════════
  # Job 2: 构建源码分发包 (sdist + wheel + win-source-zip)
  # ═══════════════════════════════════════════════════════════════════
  build-sdist:
    name: "Build source packages"
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build wheel

      - name: Extract tag version
        id: tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build sdist
        run: python -m build --sdist --outdir dist/

      - name: Build wheel
        run: python -m build --wheel --outdir dist/

      - name: Create Windows source package
        run: |
          mkdir -p "dist/bili-live-cut-${{ steps.tag.outputs.version }}"
          cp -r app/ config/ pyproject.toml README.md CHANGELOG.md LICENSE* \
            "dist/bili-live-cut-${{ steps.tag.outputs.version }}/" 2>/dev/null || true
          cd dist
          zip -r "bili-live-cut-${{ steps.tag.outputs.version }}-win-portable.zip" \
            "bili-live-cut-${{ steps.tag.outputs.version }}"
          rm -rf "bili-live-cut-${{ steps.tag.outputs.version }}"

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Upload sdist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════
  # Job 3: 构建 Payload (source_payload.zip + manifest)
  # ═══════════════════════════════════════════════════════════════════
  build-payload:
    name: "Build Payload"
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 需要完整 git 历史用于 git archive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build source payload
        run: |
          pip install setuptools
          cd packaging/portable
          python build_payload.py
        timeout-minutes: 5

      - name: Upload Payload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: payload
          path: |
            packaging/portable/dist/payload/source_payload.zip
            packaging/portable/dist/payload/payload_manifest.json
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════
  # Job 4: 构建 Windows Lite EXE (PyInstaller)
  # ═══════════════════════════════════════════════════════════════════
  build-windows-lite:
    name: "Build Windows Lite EXE"
    needs: build-payload
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Payload
        uses: actions/download-artifact@v4
        with:
          name: payload
          path: packaging/portable/dist/payload/

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[dev,web]"
        timeout-minutes: 10

      - name: Build Fixture Engine Pack for CI validation
        env:
          BLC_FIXTURE_BUILD: "1"
        run: |
          cd packaging/portable
          python build_engine_pack.py --fixture
        timeout-minutes: 3

      - name: Verify Release production metadata
        run: |
          cd packaging/portable
          python -c "
import json, os, sys
info_path = 'resources/engine_pack_info.json'
if not os.path.exists(info_path):
    print('FAIL: engine_pack_info.json missing'); sys.exit(1)
info = json.load(open(info_path, encoding='utf-8'))
errors = []
# ZIP-level integrity
crc = info.get('crc32', '')
sha = info.get('sha256', '')
if not crc or len(crc) != 8:
    errors.append(f'CRC32 empty or invalid: {crc}')
if not sha or len(sha) != 64:
    errors.append(f'SHA-256 empty or invalid: {sha}')
# Nested hashes
for field in ('content_manifest_sha256', 'model_lock_sha256'):
    val = info.get(field, '')
    if not val or len(val) != 64:
        errors.append(f'{field} empty or invalid: {val}')
# Commits
for field in ('source_commit', 'builder_commit'):
    val = info.get(field, '')
    if not val or len(val) < 7:
        errors.append(f'{field} empty or too short: {val}')
# Engine IDs
ids = info.get('expected_engine_ids', [])
if len(ids) != 4:
    errors.append(f'expected_engine_ids incomplete: {ids}')
# Size
if not info.get('size_bytes', 0):
    errors.append('size_bytes is zero')
# Version
if info.get('engine_pack_version', '') != info.get('compatible_app', {}).get('min', ''):
    errors.append('version/compatible_app.min mismatch')
# Artifact class (must be production, reject fixture)
ac = info.get('artifact_class', 'production')
if ac != 'production':
    errors.append(f'artifact_class is {ac!r} — production build requires "production"')
# Format version
fv = info.get('format_version', 0)
if fv < 4:
    errors.append(f'format_version must be >= 4, got {fv}')
if errors:
    for e in errors:
        print(f'FAIL: {e}')
    sys.exit(1)
print('PASS: Engine Pack metadata valid')
"
        timeout-minutes: 1

      - name: Build Lite EXE
        run: |
          cd packaging/portable
          python build_exe.py
        timeout-minutes: 15

      - name: Download embeddable Python 3.12
        shell: pwsh
        run: |
          Write-Output "::group::Downloading embeddable Python 3.12"
          Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.12.8/python-3.12.8-embed-amd64.zip" `
            -OutFile "$env:RUNNER_TEMP\python-embed.zip"
          New-Item -ItemType Directory -Path portable-python -Force
          Expand-Archive -Path "$env:RUNNER_TEMP\python-embed.zip" -DestinationPath portable-python -Force
          Write-Output "::endgroup::"
          Write-Output "portable-python ready"
        timeout-minutes: 5

      - name: Download FFmpeg static binaries
        shell: pwsh
        run: |
          Write-Output "::group::Downloading FFmpeg"
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" `
            -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\ffmpeg.zip" -DestinationPath "$env:RUNNER_TEMP\ffmpeg-extracted" -Force
          New-Item -ItemType Directory -Path bin -Force
          $ffmpegDir = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg-extracted" -Directory | Select-Object -First 1
          Copy-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe" "bin\ffmpeg.exe"
          Copy-Item "$($ffmpegDir.FullName)\bin\ffprobe.exe" "bin\ffprobe.exe"
          Write-Output "::endgroup::"
          Write-Output "FFmpeg ready"
        timeout-minutes: 5

      - name: Download Windows wheels from lock files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path vendor\wheels -Force
          python -m pip download -r packaging/portable/locks/requirements-runtime-py311-win-x64.lock -d vendor\wheels --only-binary=:all: --platform win_amd64 --python-version 3.11
          python -m pip download -r packaging/portable/locks/requirements-runtime-py312-win-x64.lock -d vendor\wheels --only-binary=:all: --platform win_amd64 --python-version 3.12
          $wheelCount = @(Get-ChildItem vendor\wheels\*.whl -ErrorAction SilentlyContinue).Count
          Write-Output "Wheels downloaded: $wheelCount"
          if ($wheelCount -eq 0) {
            Write-Error "FATAL: No wheels downloaded — Full build will fail"
            exit 1
          }
        timeout-minutes: 15

      - name: Build Full Bundle
        run: |
          cd packaging/portable
          python build_full_bundle.py
        timeout-minutes: 5

      - name: Upload Lite EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-lite
          path: |
            packaging/portable/dist/lite/*.exe
            packaging/portable/dist/lite/build-manifest.json
            packaging/portable/dist/lite/SHA256SUMS.txt
          retention-days: 1

      - name: Upload Full ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-full
          path: |
            packaging/portable/dist/full/*.zip
            packaging/portable/dist/full/build-manifest.json
            packaging/portable/dist/full/SHA256SUMS.txt
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════
  # Job 5: 创建 GitHub Release
  # ═══════════════════════════════════════════════════════════════════
  release:
    name: "Create GitHub Release"
    needs: [build-sdist, build-windows-lite]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/sdist/

      - name: Download Lite EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-lite
          path: dist/lite/

      - name: Download Full ZIP
        uses: actions/download-artifact@v4
        with:
          name: windows-full
          path: dist/full/

      - name: Merge artifacts into dist/
        run: |
          cp dist/sdist/* dist/
          cp dist/lite/* dist/
          cp dist/full/* dist/
          ls -la dist/

      - name: Extract tag version
        id: tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Generate release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${{ steps.tag.outputs.tag }}"
          cat > /tmp/extract_notes.py << 'PYEOF'
          import re, sys, os
          version = os.environ["RELEASE_VERSION"]
          with open("CHANGELOG.md", "r", encoding="utf-8") as f:
              content = f.read()
          escaped = re.escape(version)
          pattern = re.compile(rf"(## {escaped}.+?)(?=\n## |\Z)", re.DOTALL)
          m = pattern.search(content)
          if m:
              print(m.group(1).strip())
          else:
              print(f"Release {version}")
          PYEOF
          RELEASE_VERSION="$VERSION" python /tmp/extract_notes.py > /tmp/release_notes.md
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          body_path: /tmp/release_notes.md
          files: |
            dist/*
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, 'alpha') || contains(steps.tag.outputs.tag, 'beta') || contains(steps.tag.outputs.tag, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
