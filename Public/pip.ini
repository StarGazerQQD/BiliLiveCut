# 即插即用版的 pip 镜像配置(中国内地更快)。
# setup / install / run 脚本会通过 PIP_CONFIG_FILE 指向本文件,
# 使包内任何联网 pip 操作都优先走清华、并以阿里云为备选。
[global]
index-url = https://pypi.tuna.tsinghua.edu.cn/simple
extra-index-url = https://mirrors.aliyun.com/pypi/simple/
trusted-host =
    pypi.tuna.tsinghua.edu.cn
    mirrors.aliyun.com
